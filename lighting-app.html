  <script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

const EASINGS = {
  step:   { label:"STEP",     icon:"\u23F9", fn: t => t < 1 ? 0 : 1 },
  linear: { label:"LINEAR",   icon:"/", fn: t => t },
  easeIn: { label:"EASE IN",  icon:"\u223C", fn: t => t * t },
  easeOut:{ label:"EASE OUT", icon:"\u223D", fn: t => t * (2 - t) },
  sCurve: { label:"S-CURVE",  icon:"S", fn: t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t },
  bounce: { label:"BOUNCE",   icon:"\u2248", fn: t => {
    if (t < 1/2.75) return 7.5625*t*t;
    if (t < 2/2.75) { t -= 1.5/2.75; return 7.5625*t*t+0.75; }
    if (t < 2.5/2.75) { t -= 2.25/2.75; return 7.5625*t*t+0.9375; }
    t -= 2.625/2.75; return 7.5625*t*t+0.984375;
  }},
};

    { id:"blade_c_rot", label:"Blade C Rot", unit:"°", min:0, max:360, color:"#cc99ff" },

    { id:"blade_d_rot", label:"Blade D Rot", unit:"°", min:0, max:360, color:"#ddaaff" },

  ]},
  { group:"GOBO", color:"#44ffaa", params:[

  ]},
];

const ALL_PARAMS = PARAM_GROUPS.flatMap(g => g.params);
const getParam = id => ALL_PARAMS.find(p => p.id === id) || ALL_PARAMS[0];

const TYPE_COLORS = { SPOT:"#ff5544", WASH:"#44aaff", STROBE:"#ffdd44", LED:"#aa44ff", FX:"#44ffaa", DIM:"#cccccc", ROBE_MP:"#ff8800", ROBE_MP2:"#ff6600", MAC_VIPER:"#22ccaa", MAC_VIPER2:"#11aa88" };
const FIXTURE_POSITIONS = ["FRONT 1","FRONT 2","TOP","TOP BACK","BACK","FLOOR","SIDE","CUSTOM"];
const POSITION_COLORS = {"FRONT 1":"#ff8844","FRONT 2":"#ffaa44","TOP":"#44aaff","TOP BACK":"#4466ff","BACK":"#aa44ff","FLOOR":"#44ffaa","SIDE":"#ffdd44","CUSTOM":"#888888"};
function defaultFixtures() {
  return [
    { id:1, name:"Spot 1",    color:"#ff5544", type:"SPOT",   position:"FRONT 1" },
    { id:2, name:"Spot 2",    color:"#ff5544", type:"SPOT",   position:"FRONT 1" },
    { id:3, name:"Wash 1",    color:"#44aaff", type:"WASH",   position:"TOP"     },
    { id:4, name:"Wash 2",    color:"#44aaff", type:"WASH",   position:"TOP"     },
    { id:5, name:"Strobe 1",  color:"#ffdd44", type:"STROBE", position:"FRONT 2" },
    { id:6, name:"LED Bar 1", color:"#aa44ff", type:"LED",    position:"BACK"    },
    { id:7, name:"LED Bar 2", color:"#aa44ff", type:"LED",    position:"BACK"    },
    { id:8, name:"Fog",       color:"#44ffaa", type:"FX",     position:"FLOOR"   },
  ];
}

// DMX profiles: map fixture types to channel layouts
const DMX_PROFILES = {
  SPOT: { channels:19, map:{ dimmer:{offset:0,bits:8}, pan:{offset:1,bits:16}, tilt:{offset:3,bits:16}, cyan:{offset:5,bits:8}, magenta:{offset:6,bits:8}, yellow:{offset:7,bits:8}, white:{offset:8,bits:8}, colorwheel:{offset:9,bits:8}, zoom:{offset:10,bits:8}, iris:{offset:11,bits:8}, focus:{offset:12,bits:8}, blade_a:{offset:13,bits:8}, blade_b:{offset:14,bits:8}, blade_c:{offset:15,bits:8}, blade_d:{offset:16,bits:8}, blade_rot:{offset:17,bits:8}, gobo_a:{offset:18,bits:8} }},
  WASH: { channels:10, map:{ dimmer:{offset:0,bits:8}, pan:{offset:1,bits:16}, tilt:{offset:3,bits:16}, cyan:{offset:5,bits:8}, magenta:{offset:6,bits:8}, yellow:{offset:7,bits:8}, white:{offset:8,bits:8}, zoom:{offset:9,bits:8} }},
  STROBE: { channels:3, map:{ dimmer:{offset:0,bits:8}, strobe:{offset:1,bits:8}, colorwheel:{offset:2,bits:8} }},
  LED: { channels:8, map:{ dimmer:{offset:0,bits:8}, cyan:{offset:1,bits:8}, magenta:{offset:2,bits:8}, yellow:{offset:3,bits:8}, white:{offset:4,bits:8}, strobe:{offset:5,bits:8}, zoom:{offset:6,bits:8}, colorwheel:{offset:7,bits:8} }},
  FX: { channels:2, map:{ dimmer:{offset:0,bits:8}, strobe:{offset:1,bits:8} }},
  DIM: { channels:1, map:{ dimmer:{offset:0,bits:8} }},
  ROBE_MP: { channels:38, map:{ pan:{offset:0,bits:16}, tilt:{offset:2,bits:16}, cyan:{offset:6,bits:8}, magenta:{offset:7,bits:8}, yellow:{offset:8,bits:8}, colorwheel:{offset:9,bits:8}, gobo_a:{offset:19,bits:8}, gobo_a_rot:{offset:20,bits:8}, zoom:{offset:31,bits:8}, focus:{offset:33,bits:8}, strobe:{offset:36,bits:8}, dimmer:{offset:37,bits:8} }},
  ROBE_MP2: { channels:34, map:{ pan:{offset:0,bits:16}, tilt:{offset:2,bits:16}, cyan:{offset:6,bits:8}, magenta:{offset:7,bits:8}, yellow:{offset:8,bits:8}, colorwheel:{offset:9,bits:8}, gobo_a:{offset:18,bits:8}, gobo_a_rot:{offset:19,bits:8}, zoom:{offset:29,bits:8}, focus:{offset:30,bits:8}, strobe:{offset:32,bits:8}, dimmer:{offset:33,bits:8} }},
  MAC_VIPER: { channels:26, map:{ strobe:{offset:0,bits:8}, dimmer:{offset:1,bits:8}, cyan:{offset:2,bits:8}, magenta:{offset:3,bits:8}, yellow:{offset:4,bits:8}, colorwheel:{offset:6,bits:8}, gobo_a:{offset:7,bits:8}, gobo_a_rot:{offset:8,bits:8}, iris:{offset:18,bits:8}, zoom:{offset:19,bits:8}, focus:{offset:20,bits:8}, pan:{offset:21,bits:16}, tilt:{offset:23,bits:16} }},
  MAC_VIPER2: { channels:34, map:{ strobe:{offset:0,bits:8}, dimmer:{offset:1,bits:16}, cyan:{offset:3,bits:8}, magenta:{offset:4,bits:8}, yellow:{offset:5,bits:8}, colorwheel:{offset:7,bits:8}, gobo_a:{offset:8,bits:8}, gobo_a_rot:{offset:9,bits:8}, iris:{offset:19,bits:8}, zoom:{offset:20,bits:16}, focus:{offset:22,bits:16}, pan:{offset:24,bits:16}, tilt:{offset:26,bits:16} }},
};
// Built-in profile names (cannot be overwritten by custom)
const BUILTIN_PROFILES = new Set(Object.keys(DMX_PROFILES));
// SPOT kept as fallback type (fixtures revert to SPOT when their type is removed)
const CORE_PROFILES = new Set();
// Load hidden profiles from localStorage
let _hiddenProfiles = new Set();
try { _hiddenProfiles = new Set(JSON.parse(localStorage.getItem("lumina-hidden-profiles") || "[]")); } catch(e) {}
// Load custom profiles from localStorage
try {
  const custom = JSON.parse(localStorage.getItem("lumina-custom-profiles") || "{}");
  Object.entries(custom).forEach(([name, prof]) => {
    DMX_PROFILES[name] = { channels: prof.channels, map: prof.map };
    TYPE_COLORS[name] = prof.color || "#888888";
  });
} catch(e) {}
// Load user folders from localStorage
let _userFolders = {};
try { _userFolders = JSON.parse(localStorage.getItem("lumina-user-folders") || "{}"); } catch(e) {}

function generateDefaultPatch(fixtures) {
  const patch = {};
  let uni = 1, addr = 1;
  fixtures.forEach(fx => {
    const profile = DMX_PROFILES[fx.type] || DMX_PROFILES.SPOT;
    // Advance to next universe if fixture won't fit in current one
    if (addr + profile.channels - 1 > 512) { uni++; addr = 1; }
    if (uni > 64) return; // Max 64 universes
    const overrides = {};
    Object.entries(profile.map).forEach(([paramId, {offset, bits}]) => {
      overrides[paramId] = { universe:uni, channel: addr + offset, bits };
    });
    patch[fx.id] = { universe:uni, address:addr, profile:fx.type, overrides };
    addr += profile.channels;
  });
  return patch;
}

function scaleParam(paramId, logicalValue, bits) {
  const p = getParam(paramId);
  if (!p) return 0;
  const norm = Math.max(0, Math.min(1, (logicalValue - p.min) / Math.max(1, p.max - p.min)));
  return bits === 16 ? Math.round(norm * 65535) : Math.round(norm * 255);
}

function buildDMXFrames(liveValues, dmxPatch) {
  const universes = {};
  for (const [key, val] of Object.entries(liveValues)) {
    const idx = key.indexOf("-");
    const fxId = parseInt(key.substring(0, idx));
    const paramId = key.substring(idx + 1);
    const patch = dmxPatch[fxId];
    if (!patch) continue;
    const profile = DMX_PROFILES[patch.profile];
    if (!profile || !profile.map[paramId]) continue;
    let uni, addr, bits;
    if (patch.overrides && patch.overrides[paramId]) {
      const ov = patch.overrides[paramId];
      if (ov.bypass) continue;
      uni = ov.universe || patch.universe;
      addr = ov.channel;
      bits = ov.bits || profile.map[paramId].bits;
    } else {
      uni = patch.universe;
      addr = patch.address + profile.map[paramId].offset;
      bits = profile.map[paramId].bits;
    }
    if (addr < 1 || addr > 512) continue;
    if (!universes[uni]) universes[uni] = new Array(512).fill(0);
    const frame = universes[uni];
    const scaled = scaleParam(paramId, val, bits);
    if (bits === 16 && addr < 512) {
      frame[addr - 1] = (scaled >> 8) & 0xFF;
      frame[addr] = scaled & 0xFF;
    } else {
      frame[addr - 1] = scaled & 0xFF;
    }
  }
  return universes;
}

// Sparse override format: only channels with active cue values
// Returns { "uni": { "ch_index": value, ... }, ... }
function buildDMXOverrides(liveValues, dmxPatch) {
  const overrides = {};
  for (const [key, val] of Object.entries(liveValues)) {
    const idx = key.indexOf("-");
    const fxId = parseInt(key.substring(0, idx));
    const paramId = key.substring(idx + 1);
    const patch = dmxPatch[fxId];
    if (!patch) continue;
    const profile = DMX_PROFILES[patch.profile];
    if (!profile || !profile.map[paramId]) continue;
    let uni, addr, bits;
    if (patch.overrides && patch.overrides[paramId]) {
      const ov = patch.overrides[paramId];
      if (ov.bypass) continue;
      uni = ov.universe || patch.universe;
      addr = ov.channel;
      bits = ov.bits || profile.map[paramId].bits;
    } else {
      uni = patch.universe;
      addr = patch.address + profile.map[paramId].offset;
      bits = profile.map[paramId].bits;
    }
    if (addr < 1 || addr > 512) continue;
    if (!overrides[uni]) overrides[uni] = {};
    const scaled = scaleParam(paramId, val, bits);
    if (bits === 16 && addr < 512) {
      overrides[uni][addr - 1] = (scaled >> 8) & 0xFF;
      overrides[uni][addr] = scaled & 0xFF;
    } else {
      overrides[uni][addr - 1] = scaled & 0xFF;
    }
  }
  return overrides;
}

const BEAT_WIDTH=40, LANE_H=34, FIXTURE_HDR_H=28, GROUP_HDR_H=20, RULER_H=36, LABEL_W=130, PARAM_LABEL_W=100, TOTAL_BEATS=64;
function genId() { return Math.random().toString(36).substr(2,9); }

function interpolateCue(cue, beat) {
  const t = Math.max(0, Math.min(1, (beat - cue.beat) / cue.duration));
  const easeFn = EASINGS[cue.easing || "linear"].fn;
  const fadeIn = cue.fadeIn || 0, fadeOut = cue.fadeOut || 0;
  const param = getParam(cue.param);
  const startVal = cue.startValue !== undefined ? cue.startValue : param.min;
  const endVal = cue.endValue !== undefined ? cue.endValue : cue.value;
  if (fadeIn > 0 && t < fadeIn) return startVal + easeFn(t/fadeIn) * (cue.value - startVal);
  if (fadeOut > 0 && t > (1-fadeOut)) return cue.value + easeFn((t-(1-fadeOut))/fadeOut) * (endVal - cue.value);
  return cue.value;
}

function buildCurvePath(cue, w, h) {
  const steps = Math.max(4, Math.floor(w/4));
  const easeFn = EASINGS[cue.easing || "linear"].fn;
  const fadeIn = cue.fadeIn||0, fadeOut = cue.fadeOut||0;
  const param = getParam(cue.param);
  const startVal = cue.startValue !== undefined ? cue.startValue : param.min;
  const endVal = cue.endValue !== undefined ? cue.endValue : param.min;
  const range = param.max - param.min;
  const pts = Array.from({length:steps+1}, (_,i) => {
    const t = i/steps;
    let val;
    if (fadeIn>0 && t<fadeIn) val = startVal + easeFn(t/fadeIn)*(cue.value-startVal);
    else if (fadeOut>0 && t>1-fadeOut) val = cue.value + easeFn((t-(1-fadeOut))/fadeOut)*(endVal-cue.value);
    else val = cue.value;
    const norm = range>0 ? (val-param.min)/range : 0.5;
    return `${(t*w).toFixed(1)},${(h-norm*h).toFixed(1)}`;
  });
  return `M ${pts.join(" L ")}`;
}

const CurvePath = React.memo(function CurvePath({ cue, w, h, color, isActive }) {
  const path = useMemo(() => buildCurvePath(cue, w, h), [cue.easing, cue.fadeIn, cue.fadeOut, cue.value, cue.startValue, cue.endValue, w, h]);
  return (
    <svg style={{position:"absolute",top:0,left:0,width:w,height:h,pointerEvents:"none",overflow:"visible"}}>
      <path d={`${path} L ${w},${h} L 0,${h} Z`} fill={color+"18"} />
      <path d={path} fill="none" stroke={isActive ? color+"cc" : color+"66"} strokeWidth={isActive?1.5:1} />
      {(cue.fadeIn||0)>0 && <line x1={cue.fadeIn*w} y1={0} x2={cue.fadeIn*w} y2={h} stroke={color+"55"} strokeWidth={1} strokeDasharray="2,2"/>}
      {(cue.fadeOut||0)>0 && <line x1={(1-cue.fadeOut)*w} y1={0} x2={(1-cue.fadeOut)*w} y2={h} stroke={color+"55"} strokeWidth={1} strokeDasharray="2,2"/>}
    </svg>
  );
});

const EFFECT_TYPES = [
  { id:"chase", label:"Chase", icon:"\u21C6", desc:"Sequential across fixtures" },
  { id:"sine", label:"Sine", icon:"\u223F", desc:"Smooth oscillation" },
  { id:"rampUp", label:"Ramp Up", icon:"\u2197", desc:"Fade min to max" },
  { id:"rampDown", label:"Ramp Down", icon:"\u2198", desc:"Fade max to min" },
  { id:"pulse", label:"Pulse", icon:"\u2022", desc:"Short burst on/off" },
  { id:"strobe", label:"Strobe", icon:"\u26A1", desc:"Rapid on/off" },
  { id:"random", label:"Random", icon:"\u2684", desc:"Random values per beat" },
  { id:"fan", label:"Fan", icon:"\u2261", desc:"Spread values across fixtures" },
  { id:"ballyhoo", label:"Ballyhoo", icon:"\u27F3", desc:"Circular pan+tilt motion" },
];

function generateEffect({ effectType, fixtures, paramId, speed, offset, crossfade, rangeMin, rangeMax, easing, startBeat, endBeat }) {
  const cues = [];
  const dur = endBeat - startBeat;
  const n = fixtures.length;
  if (n === 0 || dur <= 0) return cues;
  const param = getParam(paramId);
  const lo = rangeMin ?? param.min, hi = rangeMax ?? param.max;
  const batchId = genId();

  const spread = offset / 100;

  const xf = (crossfade || 0) / 100;

  if (effectType === "chase") {
    const slotDur = dur / n;
    const xfadeDur = xf * slotDur;
    fixtures.forEach((fx, fi) => {
      const slotStart = startBeat + fi * slotDur;
      const b = Math.max(startBeat, slotStart - xfadeDur / 2);
      const cueDur = Math.min(slotDur + xfadeDur, endBeat - b);
      const fadeIn = xfadeDur > 0 ? (xfadeDur / 2) / cueDur : 0.15;
      const fadeOut = xfadeDur > 0 ? (xfadeDur / 2) / cueDur : 0.15;
      cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:cueDur, value:hi, easing:easing||"linear", fadeIn, fadeOut, startValue:lo, endValue:lo });
    });
  } else if (effectType === "sine") {
    const totalSteps = Math.max(8, Math.round(dur * 2));
    const stepDur = dur / totalSteps;
    fixtures.forEach((fx, fi) => {
      const phaseOff = spread * (fi / n) * 2 * Math.PI;
      for (let s = 0; s < totalSteps; s++) {
        const b = startBeat + s * stepDur;
        const phase = (s / totalSteps) * 2 * Math.PI + phaseOff;
        const nextPhase = ((s + 1) / totalSteps) * 2 * Math.PI + phaseOff;
        const val = Math.round(lo + (hi - lo) * (0.5 - 0.5 * Math.cos(phase)));
        const nextVal = Math.round(lo + (hi - lo) * (0.5 - 0.5 * Math.cos(nextPhase)));
        cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:stepDur, value:val, easing:"linear", fadeIn:0, fadeOut:0, startValue:val, endValue:nextVal });
      }
    });
  } else if (effectType === "rampUp") {
    const slotDur = dur / n;
    const xfadeDur = xf * slotDur;
    fixtures.forEach((fx, fi) => {
      const slotStart = startBeat + fi * slotDur;
      const b = Math.max(startBeat, slotStart - xfadeDur / 2);
      const cueDur = Math.min(slotDur + xfadeDur, endBeat - b);
      cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:cueDur, value:hi, easing:easing||"linear", fadeIn:1, fadeOut:0, startValue:lo, endValue:hi });
    });
  } else if (effectType === "rampDown") {
    const slotDur = dur / n;
    const xfadeDur = xf * slotDur;
    fixtures.forEach((fx, fi) => {
      const slotStart = startBeat + fi * slotDur;
      const b = Math.max(startBeat, slotStart - xfadeDur / 2);
      const cueDur = Math.min(slotDur + xfadeDur, endBeat - b);
      cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:cueDur, value:lo, easing:easing||"linear", fadeIn:1, fadeOut:0, startValue:hi, endValue:lo });
    });
  } else if (effectType === "pulse") {
    const cycleLen = speed;
    const pulseDur = Math.min(cycleLen * 0.4, 0.5);
    fixtures.forEach((fx, fi) => {
      const phaseOff = spread * (fi / n) * cycleLen;
      for (let cycle = 0; cycle * cycleLen < dur; cycle++) {
        const t = cycle * cycleLen + phaseOff;
        const b = startBeat + (t % dur);
        if (b >= startBeat && b + pulseDur <= endBeat) cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:pulseDur, value:hi, easing:easing||"easeOut", fadeIn:0.05, fadeOut:0.6, startValue:lo, endValue:lo });
      }
    });
  } else if (effectType === "strobe") {
    const strobeDur = 0.125;
    const gap = Math.max(0.125, speed / 8);
    fixtures.forEach((fx, fi) => {
      const phaseOff = spread * (fi / n) * gap;
      for (let cycle = 0; cycle * gap < dur; cycle++) {
        const t = cycle * gap + phaseOff;
        const b = startBeat + (t % dur);
        if (b >= startBeat && b + strobeDur <= endBeat) cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:strobeDur, value:hi, easing:"step", fadeIn:0, fadeOut:0, startValue:lo, endValue:lo });
      }
    });
  } else if (effectType === "random") {
    const stepDur = speed / 4;
    fixtures.forEach((fx) => {
      for (let t = 0; t < dur; t += stepDur) {
        const b = startBeat + t;
        const val = Math.round(lo + Math.random() * (hi - lo));
        if (b + stepDur <= endBeat) cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:b, duration:stepDur, value:val, easing:easing||"step", fadeIn:0, fadeOut:0, startValue:val, endValue:val });
      }
    });
  } else if (effectType === "fan") {
    fixtures.forEach((fx, fi) => {
      const val = n > 1 ? Math.round(lo + (hi - lo) * fi / (n - 1)) : Math.round((lo + hi) / 2);
      cues.push({ id:genId(), batchId, fixtureId:fx.id, param:paramId, beat:startBeat, duration:dur, value:val, easing:"linear", fadeIn:0, fadeOut:0, startValue:val, endValue:val });
    });
  } else if (effectType === "ballyhoo") {
    const cycleLen = speed;
    const steps = 8;
    const stepDur = cycleLen / steps;
    const panParam = getParam("pan"), tiltParam = getParam("tilt");
    const panLo = panParam.min, panHi = panParam.max, panMid = (panLo + panHi) / 2, panR = (panHi - panLo) * 0.3;
    const tiltLo = tiltParam.min, tiltHi = tiltParam.max, tiltMid = (tiltLo + tiltHi) / 2, tiltR = (tiltHi - tiltLo) * 0.3;
    fixtures.forEach((fx, fi) => {
      const phaseOff = spread * (fi / n) * cycleLen;
      for (let t = 0; t < dur; t += stepDur) {
        const b = startBeat + t;
        const phase = ((t + phaseOff) / cycleLen) * Math.PI * 2;
        const panVal = Math.round(panMid + panR * Math.cos(phase));
        const tiltVal = Math.round(tiltMid + tiltR * Math.sin(phase));
        const nextPhase = ((t + stepDur + phaseOff) / cycleLen) * Math.PI * 2;
        if (b + stepDur <= endBeat) {
          cues.push({ id:genId(), batchId, fixtureId:fx.id, param:"pan", beat:b, duration:stepDur, value:panVal, easing:"linear", fadeIn:0, fadeOut:0, startValue:panVal, endValue:Math.round(panMid + panR * Math.cos(nextPhase)) });
          cues.push({ id:genId(), batchId, fixtureId:fx.id, param:"tilt", beat:b, duration:stepDur, value:tiltVal, easing:"linear", fadeIn:0, fadeOut:0, startValue:tiltVal, endValue:Math.round(tiltMid + tiltR * Math.sin(nextPhase)) });
        }
      }
    });
  }
  return cues;
}

const EffectGenerator = React.memo(function EffectGenerator({ fixtures, setCues, loopStart, loopEnd, fxStart, fxEnd, setExpandedFixtures, setExpandedGroups }) {

  const selAll = () => setSelFixtures(new Set(fixtures.map(f => f.id)));
  const selNone = () => setSelFixtures(new Set());

    let fxList = fixtures.filter(f => selFixtures.has(f.id));

    const newCues = generateEffect({ effectType, fixtures:fxList, paramId, speed, offset, crossfade, rangeMin: param.min, rangeMax: param.max, easing, startBeat: fxStart, endBeat: fxEnd });
    if (newCues.length === 0) return;
    const bid = newCues[0].batchId;

    setCues(prev => [...prev, ...newCues]);
    setExpandedFixtures(new Set(fxList.map(f => f.id)));

    const dur = fxEnd - fxStart;

const SEQ_CATS = PARAM_GROUPS.map(g=>({
  id:g.group,
  label:{INTENSITY:"DIM",POSITION:"POS",COLOR:"COL",BEAM:"BEAM",BLADES:"BLDE",GOBO:"GOBO"}[g.group],
  color:g.color
}));

const SequenceStoragePanel = React.memo(function SequenceStoragePanel({ fixtures, setFixtures, setDmxPatch, sequenceStorage, setSequenceStorage, seqCategory, setSeqCategory, seqStoreMode, setSeqStoreMode, seqClearMode, setSeqClearMode, seqRecallMode, setSeqRecallMode, seqFadeBeats, setSeqFadeBeats, cues, selectedCues, setCues, lastRecalledBatchId, setLastRecalledBatchId, liveValues, playhead, mutedLanes, setMutedLanes }) {
  const cat = SEQ_CATS.find(c=>c.id===seqCategory)||SEQ_CATS[0];
  const slots = sequenceStorage[seqCategory]||[];
  const fileInputRef = useRef(null);

  // Seq-only save/load (v2 format)
  const handleSaveSeq = () => {
    const data = { type:"lumina-project", version:2, savedAt:new Date().toISOString(), fixtures, cues, sequenceStorage, mutedLanes:[...mutedLanes] };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "lumina-seq-" + new Date().toISOString().slice(0,19).replace(/[:.]/g,"-") + ".lumina";
    a.click();
    URL.revokeObjectURL(url);
  };
  const handleLoadSeq = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if(data.type !== "lumina-project") { alert("Not a valid LUMINA file"); return; }
        if(data.cues) setCues(data.cues.map(c => ({...c, id: genId(), batchId: null})));
        if(data.sequenceStorage) setSequenceStorage(data.sequenceStorage);
        if(data.mutedLanes) setMutedLanes(new Set(data.mutedLanes));
      } catch(err) { alert("Failed to load: " + err.message); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const handleClick = (i) => {
    if(seqStoreMode){
      const src = selectedCues&&selectedCues.size>0 ? cues.filter(c=>selectedCues.has(c.id)) : [...cues];
      if(src.length===0) return;
      const stored = { label:"S."+String(i+1).padStart(2,"0"), cues:src.map(c=>({...c,id:null,batchId:null})), storedAt:Date.now(), cueCount:src.length, color:cat.color };
      setSequenceStorage(prev=>{const n={...prev};n[seqCategory]=[...prev[seqCategory]];n[seqCategory][i]=stored;return n;});
      setSeqStoreMode(false);
    } else if(seqClearMode){
      if(!slots[i]) return;
      setSequenceStorage(prev=>{const n={...prev};n[seqCategory]=[...prev[seqCategory]];n[seqCategory][i]=null;return n;});
      setSeqClearMode(false);
    } else {
      if(!slots[i]) return;
      const bid = genId();
      const fade = seqFadeBeats;
      const recalled = slots[i].cues.map(c=>({...c, id:genId(), batchId:bid}));
      // Build crossfade transition cues when fade > 0
      const xfadeCues = [];
      if(fade > 0) {
        // Find target values from the new sequence (use each cue's steady value)
        const newTargets = {};
        recalled.forEach(c => {
          const k = `${c.fixtureId}-${c.param}`;
          newTargets[k] = { fixtureId:c.fixtureId, param:c.param, value:c.value };
        });
        // For every currently live parameter, create a transition cue
        Object.entries(liveValues).forEach(([k, oldVal]) => {
          const idx = k.indexOf("-");
          const fxId = parseInt(k.substring(0, idx));
          const paramId = k.substring(idx + 1);
          const target = newTargets[k];
          const targetVal = target ? target.value : (getParam(paramId)?.min ?? 0);
          if(Math.abs(oldVal - targetVal) > 0.01) {
            xfadeCues.push({
              id:genId(), batchId:bid, fixtureId:fxId, param:paramId,
              beat:playhead, duration:fade,
              value:targetVal, startValue:oldVal, endValue:targetVal,
              fadeIn:1, fadeOut:0, easing:"linear"
            });
          }
        });
      }
      if(seqRecallMode==="replace") setCues([...recalled, ...xfadeCues]);
      else setCues(prev=>[...prev,...recalled, ...xfadeCues]);
      setLastRecalledBatchId(bid);
    }
  };

  const totalStored = Object.values(sequenceStorage).reduce((a,arr)=>a+arr.filter(Boolean).length,0);

  return (

        <button onClick={()=>{setSeqClearMode(!seqClearMode);setSeqStoreMode(false);}} style={{flex:1,padding:"10px 0",fontSize:12,letterSpacing:1,background:seqClearMode?"#1c0f0f":"#0c0e12",border:seqClearMode?"1px solid #ff5544":"1px solid #252930",color:seqClearMode?"#ff5544":"#555",borderRadius:5,cursor:"pointer",animation:seqClearMode?"seqclear 1.5s ease-in-out infinite":"none",fontWeight:"bold",minHeight:44,touchAction:"manipulation"}}>✖ CLEAR</button>
        <button onClick={()=>setSeqRecallMode(seqRecallMode==="merge"?"replace":"merge")} style={{flex:1,padding:"10px 0",fontSize:12,letterSpacing:1,background:"#0c0e12",border:"1px solid #252930",color:seqRecallMode==="merge"?"#44aaff":"#ff8844",borderRadius:5,cursor:"pointer",fontWeight:"bold",minHeight:44,touchAction:"manipulation"}}>{seqRecallMode==="merge"?"MERGE":"REPLACE"}</button>
      </div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <span style={{fontSize:8,color:"#555",letterSpacing:1,whiteSpace:"nowrap"}}>FADE</span>
        <input type="range" min={0} max={16} step={0.25} value={seqFadeBeats} onChange={e=>setSeqFadeBeats(+e.target.value)} style={{flex:1,accentColor:seqFadeBeats>0?"#e8aa22":"#333"}}/>
        <span style={{fontSize:9,color:seqFadeBeats>0?"#e8aa22":"#555",fontFamily:"monospace",width:40,textAlign:"right"}}>{seqFadeBeats>0?seqFadeBeats+"b":"OFF"}</span>
      </div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <button onClick={handleSaveSeq} style={{flex:1,padding:"10px 0",fontSize:12,letterSpacing:1,background:"#0a1a0a",border:"1px solid #44ffaa44",color:"#44ffaa",borderRadius:5,cursor:"pointer",fontWeight:"bold",minHeight:44,touchAction:"manipulation"}}>💾 SAVE</button>
        <button onClick={()=>fileInputRef.current.click()} style={{flex:1,padding:"10px 0",fontSize:12,letterSpacing:1,background:"#0a0a1a",border:"1px solid #4488ff44",color:"#4488ff",borderRadius:5,cursor:"pointer",fontWeight:"bold",minHeight:44,touchAction:"manipulation"}}>📂 LOAD</button>
        <input ref={fileInputRef} type="file" accept=".lumina,.json" onChange={handleLoadSeq} style={{display:"none"}}/>
      </div>
      <div style={{display:"flex",gap:1,background:"#0c0e12",borderRadius:3,overflow:"hidden"}}>
        {SEQ_CATS.map(c=>(
          <button key={c.id} onClick={()=>{setSeqCategory(c.id);setSeqStoreMode(false);setSeqClearMode(false);}} style={{flex:1,padding:"4px 0",fontSize:7,letterSpacing:0.5,background:seqCategory===c.id?"#1c2030":"transparent",border:"none",borderBottom:seqCategory===c.id?`2px solid ${c.color}`:"2px solid transparent",color:seqCategory===c.id?c.color:"#3a3f4c",cursor:"pointer",fontWeight:seqCategory===c.id?"bold":"normal"}}>{c.label}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:2,flex:1}}>
        {Array.from({length:100},(_,i)=>{
          const slot=slots[i];
          const isLastRecalled=slot&&lastRecalledBatchId&&slot.cues.length>0;
          const occupied=!!slot;
          return (
            <button key={i} onClick={()=>handleClick(i)} title={occupied?`${slot.label} — ${slot.cueCount} cues`:`Slot ${i+1} — empty`} style={{
              position:"relative",
              background: seqStoreMode ? "#1a1500" : (occupied ? `${cat.color}18` : "#0c0e12"),
              border: seqStoreMode ? "1px solid #e8aa2244" : (seqClearMode&&occupied ? "1px solid #ff554466" : (occupied ? `1px solid ${cat.color}55` : "1px solid #1a1e26")),
              color: occupied ? cat.color : (seqStoreMode ? "#e8aa2244" : "#1e2028"),
              borderRadius: 2,
              cursor: (seqStoreMode || (occupied && !seqClearMode) || (occupied && seqClearMode)) ? "pointer" : "default",
              fontSize: 7,
              fontWeight: occupied ? "bold" : "normal",
              padding: 0,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "center",
              minHeight: 18,
              overflow: "hidden",
              transition: "all 0.15s",
            }}>
              <span style={{lineHeight:1}}>{String(i+1).padStart(2,"0")}</span>
              {occupied&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:cat.color,opacity:0.6}}/>}
            </button>
          );
        })}
      </div>
      <div style={{fontSize:8,color:"#3a3f4c",textAlign:"center",paddingTop:2}}>
        {slots.filter(Boolean).length} / 100 stored{seqStoreMode?" — click slot to store":seqClearMode?" — click slot to clear":""}
      </div>
    </div>
  );
});

const defaultCues = [
  {id:genId(),fixtureId:1,param:"dimmer",beat:0,duration:4,value:100,easing:"easeIn",fadeIn:0.3,fadeOut:0.2,startValue:0,endValue:0},
  {id:genId(),fixtureId:1,param:"dimmer",beat:8,duration:2,value:80,easing:"linear",fadeIn:0,fadeOut:0,startValue:0,endValue:0},
  {id:genId(),fixtureId:1,param:"pan",beat:0,duration:8,value:270,easing:"sCurve",fadeIn:0.5,fadeOut:0.5,startValue:180,endValue:180},

  {id:genId(),fixtureId:2,param:"dimmer",beat:4,duration:4,value:100,easing:"easeIn",fadeIn:0.3,fadeOut:0.3,startValue:0,endValue:0},
  {id:genId(),fixtureId:2,param:"magenta",beat:0,duration:8,value:60,easing:"sCurve",fadeIn:0.3,fadeOut:0.3,startValue:0,endValue:0},
  {id:genId(),fixtureId:3,param:"dimmer",beat:0,duration:8,value:75,easing:"linear",fadeIn:0.1,fadeOut:0.1,startValue:0,endValue:0},

];

const FixturePadBar = React.memo(function FixturePadBar({ fixtures, cues, setCues, playhead, playheadRef, beatEventRef, audioMode, onParamSelect }) {
  const [activeParam, setActiveParam] = useState("dimmer");
  const [mode, setMode] = useState(null);
  const [heldPads, setHeldPads] = useState(new Set());
  const [padValues, setPadValues] = useState(() => { const m={}; fixtures.forEach(fx=>{m[fx.id]=100;}); return m; });
  const [quantize, setQuantize] = useState(false);
  const param = getParam(activeParam);
  const pressStart = useRef({});
  const lastBeatTimeRef = useRef(0);

  // MIDI state
  const [midiConnected, setMidiConnected] = useState(false);
  const [midiLearn, setMidiLearn] = useState(null); // fixtureId waiting for learn, or null
  const [midiMap, setMidiMap] = useState(() => {
    try { return JSON.parse(localStorage.getItem("lumina-midi-map")) || {}; } catch(e) { return {}; }
  });
  const midiMapRef = useRef(midiMap);
  const midiLearnRef = useRef(null);
  const handlePadPressRef = useRef(null);
  const handlePadReleaseRef = useRef(null);

  useEffect(() => { midiMapRef.current = midiMap; localStorage.setItem("lumina-midi-map", JSON.stringify(midiMap)); }, [midiMap]);
  useEffect(() => { midiLearnRef.current = midiLearn; }, [midiLearn]);

  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const noteName = n => NOTE_NAMES[n % 12] + (Math.floor(n / 12) - 1);
  const reverseMidiMap = useMemo(() => { const r={}; Object.entries(midiMap).forEach(([note,fxId])=>{ r[fxId]=parseInt(note); }); return r; }, [midiMap]);

  const connectMidi = useCallback(async () => {
    if (!navigator.requestMIDIAccess) { alert("Web MIDI not supported in this browser. Please use Google Chrome."); return; }
    try {
      const access = await navigator.requestMIDIAccess({sysex: false});
      setMidiConnected(true);
      const onMessage = e => {
        const [status, note, velocity] = e.data;
        const cmd = status & 0xf0;
        // Learn mode: assign this note to waiting fixture
        if (midiLearnRef.current !== null && cmd === 0x90 && velocity > 0) {
          const fxId = midiLearnRef.current;
          setMidiMap(prev => {
            const next = {...prev};
            // Remove old mapping for this fixture
            Object.keys(next).forEach(k => { if(next[k] === fxId) delete next[k]; });
            next[note] = fxId;
            return next;
          });
          setMidiLearn(null);
          return;
        }
        // Note on
        if (cmd === 0x90 && velocity > 0) {
          const fxId = midiMapRef.current[note];
          if (fxId && handlePadPressRef.current) handlePadPressRef.current(fxId);
        }
        // Note off
        if (cmd === 0x80 || (cmd === 0x90 && velocity === 0)) {
          const fxId = midiMapRef.current[note];
          if (fxId && handlePadReleaseRef.current) handlePadReleaseRef.current(fxId);
        }
      };
      access.inputs.forEach(input => { input.onmidimessage = onMessage; });
      access.onstatechange = () => {
        access.inputs.forEach(input => { input.onmidimessage = onMessage; });
      };
    } catch(err) { alert("MIDI access denied: " + err.message + "\n\nTip: Use Google Chrome and open via localhost for best MIDI support."); }
  }, []);

  useEffect(() => {
    if (mode !== "rec" || !audioMode || audioMode === "none" || !beatEventRef?.current) return;
    const check = () => {
      const evt = beatEventRef.current;
      if (evt && evt.time > lastBeatTimeRef.current) {
        lastBeatTimeRef.current = evt.time;
        fixtures.forEach(fx => {
          if (heldPads.has(fx.id)) {
            const val = padValues[fx.id] ?? Math.round((param.min+param.max)/2);
            setCues(prev => [...prev, {id:genId(),fixtureId:fx.id,param:activeParam,beat:evt.beat,duration:0.5,value:val,easing:"linear",fadeIn:0.1,fadeOut:0.1,startValue:param.min,endValue:param.min}]);
          }
        });
      }
    };
    const iv = setInterval(check, 50);
    return () => clearInterval(iv);
  }, [mode, audioMode, heldPads, padValues, activeParam, param, setCues, beatEventRef]);

  const dimmerLive = useMemo(() => {
    const m={};
    cues.forEach(c => { if(c.param==="dimmer"&&playhead>=c.beat&&playhead<c.beat+c.duration) m[c.fixtureId]=interpolateCue(c,playhead)/100; });
    return m;
  }, [cues, playhead]);

  const paramLive = useMemo(() => {
    const m={};
    cues.forEach(c => { if(c.param===activeParam&&playhead>=c.beat&&playhead<c.beat+c.duration) m[c.fixtureId]=interpolateCue(c,playhead); });
    return m;
  }, [cues, playhead, activeParam]);

  const hasCueForParam = fxId => cues.some(c => c.fixtureId===fxId && c.param===activeParam);
  const isActiveCue = fxId => cues.some(c => c.fixtureId===fxId && c.param===activeParam && playhead>=c.beat && playhead<c.beat+c.duration);

  const handlePadPress = fxId => {
    setHeldPads(prev => new Set([...prev, fxId]));
    if (mode==="rec") {
      const rawBeat = playheadRef.current;
      const beatSnap = quantize ? Math.round(rawBeat*4)/4 : rawBeat;
      const val = padValues[fxId] ?? Math.round((param.min+param.max)/2);
      const cueId = genId();
      pressStart.current[fxId] = { beat:beatSnap, cueId };
      setCues(prev => {
        const filtered = prev.filter(c => !(c.fixtureId===fxId&&c.param===activeParam&&rawBeat>=c.beat&&rawBeat<c.beat+c.duration));
        return [...filtered, {id:cueId,fixtureId:fxId,param:activeParam,beat:beatSnap,duration:0.25,value:val,easing:"linear",fadeIn:0.1,fadeOut:0.1,startValue:param.min,endValue:param.min}];
      });
    }
    if (mode==="erase") {
      const rawBeat = playheadRef.current;
      setCues(prev => prev.filter(c => !(c.fixtureId===fxId&&c.param===activeParam&&rawBeat>=c.beat&&rawBeat<c.beat+c.duration)));
    }
  };

  const handlePadRelease = fxId => {
    setHeldPads(prev => { const s=new Set(prev); s.delete(fxId); return s; });
    if (mode==="rec" && pressStart.current[fxId]) {
      const {beat:startBeat, cueId} = pressStart.current[fxId];
      const finalDur = Math.max(0.25, playheadRef.current - startBeat);
      setCues(prev => prev.map(c => c.id===cueId ? {...c, duration:finalDur} : c));
      delete pressStart.current[fxId];
    }
  };

  useEffect(() => { handlePadPressRef.current = handlePadPress; }, [handlePadPress]);
  useEffect(() => { handlePadReleaseRef.current = handlePadRelease; }, [handlePadRelease]);

  const WW=44, WH=88, GAP=22;
  const blackAfter = new Set([0,1,3,4,5]);
  const totalW = fixtures.length*(WW+GAP)-GAP+10;

  return (
    <div style={{background:"#110b0b",borderTop:"2px solid #3a2020",flexShrink:0}}>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}@keyframes recglow{0%,100%{box-shadow:0 0 8px #ff220066}50%{box-shadow:0 0 18px #ff2200bb}}@keyframes midipulse{0%,100%{box-shadow:0 0 6px #aa44ff44}50%{box-shadow:0 0 14px #aa44ffaa}}@keyframes midilearn{0%,100%{box-shadow:0 0 8px #cc66ffaa}50%{box-shadow:0 0 20px #cc66ffff}}`}</style>
      <div style={{display:"flex",alignItems:"center",borderBottom:"1px solid #2a1a1a",padding:"4px 10px",gap:8,flexWrap:"wrap"}}>
        <div style={{fontSize:7,color:"#5a3f3f",letterSpacing:2}}>PARAM:</div>
        <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
          {PARAM_GROUPS.map(group => group.params.map(p => {
            const isSel = activeParam===p.id;
            return <button key={p.id} onClick={()=>{setActiveParam(p.id);if(onParamSelect)onParamSelect(p.id,group.group);}} style={{padding:"2px 5px",background:isSel?p.color+"33":"#0f1115",border:"1px solid "+(isSel?p.color:"#252930"),borderRadius:3,cursor:"pointer",fontSize:9,color:isSel?p.color:"#444",fontWeight:isSel?"bold":"normal"}}>{p.label}</button>;
          }))}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          <button onClick={()=>setMode(m=>m==="rec"?null:"rec")} style={{padding:"4px 12px",background:mode==="rec"?"#ff2200":"#1a0a08",border:"2px solid "+(mode==="rec"?"#ff4422":"#3a1a14"),borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:"bold",color:mode==="rec"?"#fff":"#663322",boxShadow:mode==="rec"?"0 0 16px #ff220099":"none"}}>{mode==="rec"?"\u23FA REC":"\u23FA REC"}</button>
          <button onClick={()=>setMode(m=>m==="erase"?null:"erase")} style={{padding:"4px 12px",background:mode==="erase"?"#882200":"#100808",border:"2px solid "+(mode==="erase"?"#ff6600":"#2a1a10"),borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:"bold",color:mode==="erase"?"#ffaa44":"#443322"}}>{mode==="erase"?"\u2716 ERASE":"\u2716 ERASE"}</button>
          <button onClick={()=>setQuantize(q=>!q)} style={{padding:"4px 12px",background:quantize?"#162030":"#0c0f14",border:"2px solid "+(quantize?"#4488ff":"#252930"),borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:"bold",color:quantize?"#4488ff":"#333"}}>{"\u266A"} {quantize?"QUANT":"FREE"}</button>
          <div style={{width:1,height:20,background:"#3a2020"}}/>
          {!midiConnected ? (
            <button onClick={connectMidi} style={{padding:"4px 12px",background:"#0c0f14",border:"2px solid #252930",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:"bold",color:"#555"}}>{"\uD83C\uDFB9"} MIDI</button>
          ) : (
            <>
              <button style={{padding:"4px 10px",background:"#0a1a10",border:"2px solid #1a5a2a",borderRadius:4,fontSize:9,fontWeight:"bold",color:"#22cc55",cursor:"default"}}>{"\uD83C\uDFB9"} MIDI {"\u2713"}</button>
              <button onClick={()=>setMidiLearn(prev => prev !== null ? null : "waiting")} style={{padding:"4px 10px",background:midiLearn!==null?"#2a1a30":"#0c0f14",border:"2px solid "+(midiLearn!==null?"#aa44ff":"#252930"),borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:"bold",color:midiLearn!==null?"#cc66ff":"#555",animation:midiLearn!==null?"midipulse 1.2s infinite":"none"}}>LEARN</button>
            </>
          )}
        </div>
      </div>
      <div style={{padding:"16px 10px 8px",overflowX:"auto"}}>
        <div style={{position:"relative",width:totalW,height:WH+20}}>
          {fixtures.map((fx,idx) => {
            const isHeld=heldPads.has(fx.id);
            const dimVal=dimmerLive[fx.id]||0;
            const liveVal=paramLive[fx.id];
            const hasParam=hasCueForParam(fx.id);
            const isActive=isActiveCue(fx.id);
            const padVal=padValues[fx.id]??param.max;
            const fillPct=isActive?Math.max(0,Math.min(1,(liveVal-param.min)/Math.max(1,param.max-param.min))):(padVal-param.min)/Math.max(1,param.max-param.min);
            const glowStr=isActive?(0.3+dimVal*0.7):0;
            const x=idx*(WW+GAP);
            const keyBg=isHeld?`linear-gradient(180deg,${fx.color}dd,${fx.color}88)`:isActive?`linear-gradient(180deg,#e8eaf0 0%,#d0d4de ${(1-fillPct)*100}%,${fx.color}aa ${(1-fillPct)*100}%,${fx.color}77 100%)`:`linear-gradient(180deg,#d4d8e0,#aeb4c0)`;
            return (
              <div key={fx.id} style={{position:"absolute",left:x,top:0,width:WW}}>
                <div onMouseDown={()=>{if(midiLearn==="waiting"){setMidiLearn(fx.id);return;}handlePadPress(fx.id);}} onMouseUp={()=>{if(midiLearn!==null)return;handlePadRelease(fx.id);}} onMouseLeave={()=>{if(midiLearn!==null)return;handlePadRelease(fx.id);}}
                  style={{width:WW,height:WH,borderRadius:"3px 3px 8px 8px",background:keyBg,border:isHeld?`2px solid ${fx.color}`:isActive?`1px solid ${fx.color}bb`:"1px solid #7a7e8a",boxShadow:isHeld?`0 0 22px ${fx.color}bb,0 4px 0 #000`:isActive?`0 0 ${10+glowStr*18}px ${fx.color}77,0 6px 0 #111`:"0 6px 0 #111",cursor:mode?"pointer":"default",position:"relative",overflow:"hidden",transform:isHeld?"translateY(3px)":"translateY(0)",transition:isHeld?"none":"all 0.06s",userSelect:"none"}}>
                  <div style={{position:"absolute",top:6,left:"50%",transform:"translateX(-50%)",width:20,height:20,borderRadius:3,background:isActive?fx.color:"rgba(0,0,0,0.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:"bold",color:isActive?"#000":"#777"}}>{fx.id}</div>
                  <div style={{position:"absolute",top:28,left:0,right:0,bottom:18,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{writingMode:"vertical-lr",transform:"rotate(180deg)",fontSize:9,letterSpacing:1,color:isHeld?"#fff":isActive?"#111":"#555",fontWeight:isActive?"bold":"normal",whiteSpace:"nowrap",overflow:"hidden",maxHeight:40}}>{fx.name}</div>
                  </div>
                  <div style={{position:"absolute",bottom:5,left:0,right:0,textAlign:"center",fontSize:8,fontWeight:"bold",color:isActive?"#111":"#666"}}>{isActive&&liveVal!==undefined?Math.round(liveVal):padVal}{param.unit}</div>
                  {mode==="rec"&&<div style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:"50%",background:"#ff2200",animation:"pulse 1s infinite"}}/>}
                  {mode==="erase"&&hasParam&&<div style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:"50%",background:"#ff6600"}}/>}
                  {midiLearn===fx.id&&<div style={{position:"absolute",inset:0,borderRadius:"3px 3px 8px 8px",border:"2px solid #cc66ff",animation:"midilearn 0.8s infinite",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(170,68,255,0.15)",zIndex:5}}><span style={{fontSize:8,color:"#cc66ff",fontWeight:"bold"}}>PRESS KEY</span></div>}
                  {reverseMidiMap[fx.id]!==undefined&&midiLearn!==fx.id&&<div style={{position:"absolute",top:4,left:4,padding:"1px 3px",background:"#1a0a2a",border:"1px solid #7733aa",borderRadius:2,fontSize:7,color:"#bb88ee",fontWeight:"bold",zIndex:4}}>{noteName(reverseMidiMap[fx.id])}</div>}
                  <div style={{position:"absolute",bottom:0,left:4,right:4,height:3,borderRadius:"0 0 6px 6px",background:isHeld?fx.color+"88":isActive?fx.color+"55":"rgba(0,0,0,0.1)"}}/>
                </div>
                <div style={{marginTop:4,height:3,background:"#0c0e12",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:isActive?`${fillPct*100}%`:hasParam?"100%":"0%",background:isActive?param.color:param.color+"33",borderRadius:2,transition:"width 0.05s"}}/>
                </div>
              </div>
            );
          })}
          {fixtures.map((fx,idx) => {
            if (!blackAfter.has(idx)) return null;
            return <div key={`bk-${idx}`} style={{position:"absolute",left:idx*(WW+GAP)+WW-12,top:0,width:24,height:54,borderRadius:"2px 2px 5px 5px",background:"linear-gradient(180deg,#1a1a1a,#2e2e2e 60%,#1a1a1a)",border:"1px solid #000",boxShadow:"0 5px 0 #000",zIndex:3,pointerEvents:"none"}}/>;
          })}
        </div>
      </div>
    </div>
  );
});

function detectBpmFromBuffer(audioBuffer) {
  const rawData = audioBuffer.getChannelData(0);
  const sampleRate = audioBuffer.sampleRate;
  const downsampleFactor = Math.floor(sampleRate / 11025);
  const data = [];
  for (let i = 0; i < rawData.length; i += downsampleFactor) data.push(Math.abs(rawData[i]));
  const dsRate = sampleRate / downsampleFactor;
  const hopSize = Math.floor(dsRate * 0.023);
  const envelope = [];
  for (let i = 0; i < data.length - hopSize; i += hopSize) {
    let e = 0;
    for (let j = 0; j < hopSize; j++) e += data[i + j] * data[i + j];
    envelope.push(Math.sqrt(e / hopSize));
  }
  const diff = envelope.map((v, i) => i === 0 ? 0 : Math.max(0, v - envelope[i - 1]));
  const minLag = Math.floor(60 / (180 * 0.023));
  const maxLag = Math.floor(60 / (60 * 0.023));
  let bestLag = minLag, bestCorr = 0;
  for (let lag = minLag; lag <= Math.min(maxLag, diff.length - 1); lag++) {
    let corr = 0;
    for (let i = 0; i < diff.length - lag; i++) corr += diff[i] * diff[i + lag];
    if (corr > bestCorr) { bestCorr = corr; bestLag = lag; }
  }
  return Math.round(60 / (bestLag * 0.023));
}

function useAudioEngine({ bpm, playing, playhead, audioMode, audioVolume, audioMuted, onLevel, onBeat, onFileLoaded }) {
  const audioCtxRef = useRef(null);
  const analyserRef = useRef(null);
  const gainRef = useRef(null);
  const bufferSourceRef = useRef(null);
  const audioBufferRef = useRef(null);
  const fileStartTimeRef = useRef(0);
  const fileStartBeatRef = useRef(0);
  const detectedBpmRef = useRef(null);
  const micStreamRef = useRef(null);
  const micSourceRef = useRef(null);
  const analysisFrameRef = useRef(null);
  const prevEnergyRef = useRef(0);
  const beatCooldownRef = useRef(0);
  const playingRef = useRef(false);
  const [ctxReady, setCtxReady] = useState(false);
  playingRef.current = playing;

  const ensureContext = useCallback(() => {
    if (!audioCtxRef.current) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtxRef.current = ctx;
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.8;
      analyserRef.current = analyser;
      const gain = ctx.createGain();
      gain.gain.value = audioVolume;
      gainRef.current = gain;
      gain.connect(analyser);
      analyser.connect(ctx.destination);
      setCtxReady(true);
    }
    if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
    return audioCtxRef.current;
  }, []);

  useEffect(() => {
    if (gainRef.current && audioCtxRef.current) {
      gainRef.current.gain.setValueAtTime(audioMuted ? 0 : audioVolume, audioCtxRef.current.currentTime);
    }
  }, [audioVolume, audioMuted]);

  const loadFile = useCallback(async (file) => {
    const ctx = ensureContext();
    const arrayBuffer = await file.arrayBuffer();
    const decoded = await ctx.decodeAudioData(arrayBuffer);
    audioBufferRef.current = decoded;
    const rawData = decoded.getChannelData(0);
    const numPeaks = 2000;
    const blockSize = Math.floor(rawData.length / numPeaks);
    const peaks = new Float32Array(numPeaks);
    for (let i = 0; i < numPeaks; i++) {
      let max = 0;
      for (let j = 0; j < blockSize; j++) {
        const abs = Math.abs(rawData[i * blockSize + j]);
        if (abs > max) max = abs;
      }
      peaks[i] = max;
    }
    let detectedBpm = null;
    try { detectedBpm = detectBpmFromBuffer(decoded); } catch(e) {}
    detectedBpmRef.current = detectedBpm;
    const durationBeats = detectedBpm ? (decoded.duration / 60) * detectedBpm : (decoded.duration / 60) * bpm;
    if (onFileLoaded) onFileLoaded({ buffer: decoded, peaks, durationBeats, detectedBpm, fileName: file.name });
  }, [bpm, ensureContext, onFileLoaded]);

  const startFilePlayback = useCallback((fromBeat) => {
    const ctx = audioCtxRef.current;
    if (!ctx || !audioBufferRef.current) return;
    if (bufferSourceRef.current) { try { bufferSourceRef.current.stop(); } catch(e){} bufferSourceRef.current.disconnect(); }
    const source = ctx.createBufferSource();
    source.buffer = audioBufferRef.current;
    const detBpm = detectedBpmRef.current;
    const rate = detBpm ? bpm / detBpm : 1;
    source.playbackRate.value = rate;
    source.connect(gainRef.current);
    const offsetSeconds = detBpm ? Math.max(0, (fromBeat / detBpm) * 60) : Math.max(0, (fromBeat / bpm) * 60);
    fileStartTimeRef.current = ctx.currentTime;
    fileStartBeatRef.current = fromBeat;
    source.start(0, Math.min(offsetSeconds, audioBufferRef.current.duration));
    bufferSourceRef.current = source;
  }, [bpm]);

  const stopFilePlayback = useCallback(() => {
    if (bufferSourceRef.current) { try { bufferSourceRef.current.stop(); } catch(e){} }
  }, []);

  const seekTo = useCallback((beat) => {
    if (audioCtxRef.current && audioBufferRef.current && playingRef.current) {
      if (bufferSourceRef.current) { try { bufferSourceRef.current.stop(); } catch(e){} }
      startFilePlayback(beat);
    }
  }, [startFilePlayback]);

  const getPlaybackBeat = useCallback(() => {
    if (!audioCtxRef.current || !bufferSourceRef.current) return null;
    const elapsed = audioCtxRef.current.currentTime - fileStartTimeRef.current;
    return fileStartBeatRef.current + (elapsed * bpm) / 60;
  }, [bpm]);

  const startMic = useCallback(async () => {
    const ctx = ensureContext();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      micStreamRef.current = stream;
      const source = ctx.createMediaStreamSource(stream);
      source.connect(analyserRef.current);
      micSourceRef.current = source;
    } catch(e) { console.warn('Mic access denied:', e); }
  }, [ensureContext]);

  const stopMic = useCallback(() => {
    if (micSourceRef.current) { micSourceRef.current.disconnect(); micSourceRef.current = null; }
    if (micStreamRef.current) { micStreamRef.current.getTracks().forEach(t => t.stop()); micStreamRef.current = null; }
  }, []);

  useEffect(() => {
    if (audioMode === 'none') {
      cancelAnimationFrame(analysisFrameRef.current);
      return;
    }
    if (!analyserRef.current) {
      ensureContext();
      return;
    }
    const analyser = analyserRef.current;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    const freqArray = new Uint8Array(analyser.frequencyBinCount);
    const analyse = () => {
      if (!analyserRef.current) return;
      analyserRef.current.getByteTimeDomainData(dataArray);
      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) { const v = (dataArray[i] - 128) / 128; sum += v * v; }
      const rms = Math.sqrt(sum / dataArray.length);
      if (onLevel) onLevel(rms);
      analyserRef.current.getByteFrequencyData(freqArray);
      let lowEnergy = 0;
      for (let i = 0; i < 10; i++) lowEnergy += freqArray[i];
      lowEnergy /= 10;
      const now = performance.now();
      if (lowEnergy > prevEnergyRef.current * 1.3 && now > beatCooldownRef.current && lowEnergy > 20) {
        if (onBeat) onBeat();
        beatCooldownRef.current = now + (60000 / (bpm || 120)) * 0.4;
      }
      prevEnergyRef.current = prevEnergyRef.current * 0.85 + lowEnergy * 0.15;
      analysisFrameRef.current = requestAnimationFrame(analyse);
    };
    analysisFrameRef.current = requestAnimationFrame(analyse);
    return () => cancelAnimationFrame(analysisFrameRef.current);
  }, [audioMode, bpm, onLevel, onBeat, ctxReady, ensureContext]);

  useEffect(() => {
    if (audioMode === 'mic') { ensureContext(); startMic(); }
    else stopMic();
    if (audioMode === 'file') ensureContext();
  }, [audioMode, startMic, stopMic, ensureContext]);

  useEffect(() => {
    return () => { stopMic(); stopFilePlayback(); };
  }, []);

  return { loadFile, startFilePlayback, stopFilePlayback, seekTo, getPlaybackBeat, ensureContext };
}

const WaveformCanvas = React.memo(function WaveformCanvas({ peaks, durationBeats, beatWidth, zoom, scrollLeft, width, height, playhead, loopStart, loopEnd, loopEnabled }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !peaks) return;
    const ctx = canvas.getContext('2d');
    canvas.width = width;
    canvas.height = height;
    ctx.clearRect(0, 0, width, height);
    const totalW = durationBeats * beatWidth * zoom;
    const peakW = totalW / peaks.length;
    const startPeak = Math.max(0, Math.floor((scrollLeft / totalW) * peaks.length));
    const endPeak = Math.min(peaks.length, Math.ceil(((scrollLeft + width) / totalW) * peaks.length));
    ctx.strokeStyle = '#e8aa2255';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = startPeak; i < endPeak; i++) {
      const x = (i * peakW) - scrollLeft;
      const h = peaks[i] * height * 0.9;
      ctx.moveTo(x, (height - h) / 2);
      ctx.lineTo(x, (height + h) / 2);
    }
    ctx.stroke();
    if (loopEnabled) {
      const ls = loopStart * beatWidth * zoom - scrollLeft;
      const le = loopEnd * beatWidth * zoom - scrollLeft;
      ctx.fillStyle = 'rgba(68,255,170,0.06)';
      ctx.fillRect(ls, 0, le - ls, height);
    }
    const phX = playhead * beatWidth * zoom - scrollLeft;
    ctx.fillStyle = '#ff333388';
    ctx.fillRect(phX - 0.5, 0, 1, height);
  }, [peaks, durationBeats, beatWidth, zoom, scrollLeft, width, height, playhead, loopStart, loopEnd, loopEnabled]);
  return <canvas ref={canvasRef} style={{position:'absolute',top:0,left:0,width:width,height:height,pointerEvents:'none'}} />;
});

      // Sort all selected by beat

      }

        updates[cur.id] = { ...(updates[cur.id]||{}), endValue: cur.value, fadeOut: 0 };

        updates[next.id] = { ...(updates[next.id]||{}), startValue: next.value, fadeIn: 0 };

        return true;

            ):(
              <div style={{padding:10,display:"flex",flexDirection:"column",gap:10}}>

                  <button onClick={()=>setOutputConfig(c=>({...c,enabled:!c.enabled}))} style={{flex:1,padding:"12px 0",fontSize:13,fontWeight:"bold",letterSpacing:1,background:outputConfig.enabled?"#0a2a1a":"#0c0e12",border:"2px solid "+(outputConfig.enabled?"#22cc55":"#252930"),color:outputConfig.enabled?"#22cc55":"#555",borderRadius:6,cursor:"pointer",minHeight:44,touchAction:"manipulation"}}>{outputConfig.enabled?"OUTPUT ON":"OUTPUT OFF"}</button>

                <div style={{fontSize:8,color:"#4488ff66",letterSpacing:2,marginTop:4}}>ARTNET INPUT</div>

                  <button onClick={()=>setOutputConfig(c=>({...c,inputEnabled:!c.inputEnabled}))} style={{flex:1,padding:"12px 0",fontSize:13,fontWeight:"bold",letterSpacing:1,background:outputConfig.inputEnabled?"#0a1a2a":"#0c0e12",border:"2px solid "+(outputConfig.inputEnabled?"#4488ff":"#252930"),color:outputConfig.inputEnabled?"#4488ff":"#555",borderRadius:6,cursor:"pointer",minHeight:44,touchAction:"manipulation"}}>{outputConfig.inputEnabled?"INPUT ON":"INPUT OFF"}</button>
                  <div style={{width:8,height:8,borderRadius:"50%",background:outputConfig.inputEnabled?"#4488ff":"#333",boxShadow:outputConfig.inputEnabled?"0 0 8px #4488ff88":"none"}}/>
                </div>
                {outputConfig.inputEnabled&&<>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <span style={{fontSize:8,color:"#555"}}>Source IP:</span>
                    <div onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setKeypadState({field:'ip_source',value:outputConfig.inputSourceIP||'',rect:{top:r.bottom+2,left:r.left}});}} style={{flex:1,background:"#0c0e12",border:"1px solid "+(keypadState?.field==='ip_source'?"#4488ff":"#1e2a44"),color:"#4488ff",borderRadius:3,padding:"3px 6px",fontSize:10,cursor:"pointer",userSelect:"none",minHeight:18}}>{outputConfig.inputSourceIP||'any'}</div>

                {nicList.length>0?(
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:8,color:"#aa66dd",width:28}}>IN:</span>
                      <select value={nicConfig.inputIP} onChange={e=>{const ip=e.target.value;setNicConfig(c=>({...c,inputIP:ip}));if(outputWsRef.current?.readyState===WebSocket.OPEN)outputWsRef.current.send(JSON.stringify({type:"network_config",inputIP:ip}));}} style={{flex:1,background:"#0c0e12",border:"1px solid #3a2a44",color:"#aa66dd",borderRadius:3,padding:"2px 4px",fontSize:9}}>

                      <span style={{fontSize:8,color:"#aa66dd",width:28}}>OUT:</span>

                <div style={{display:"flex",flexDirection:"column",gap:1,marginTop:4}}>
                  {fixtures.map(fx => {

                    const hasConflict = dmxConflicts.has(String(fx.id));
                    return (
                      <div key={fx.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:7,color:hasConflict?"#ff3333":"#555"}}>

                        <span style={{width:44,overflow:"hidden",whiteSpace:"nowrap"}}>{fx.name}</span>

                        <span style={{marginLeft:"auto",color:hasConflict?"#ff333388":"#333"}}>{prof?prof.channels:0}ch</span>
                      </div>
                    );

              </div>
            )}

        </div>
      </div>

      {/* Universe Routing Modal */}
      {routingModalOpen && (
        <div onMouseDown={e=>e.stopPropagation()} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setRoutingModalOpen(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0e1018",border:"1px solid #aa66dd44",borderRadius:8,width:660,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.8)"}}>
            <div style={{display:"flex",alignItems:"center",padding:"10px 16px",borderBottom:"1px solid #1e222a"}}>
              <span style={{fontSize:12,fontWeight:"bold",color:"#aa66dd",letterSpacing:2}}>UNIVERSE ROUTING</span>
              <span style={{fontSize:9,color:"#555",marginLeft:8}}>{usedUniverses.length} universes</span>
              <div style={{flex:1}}/>

              <button onClick={()=>setRoutingModalOpen(false)} style={{padding:"4px 10px",fontSize:11,background:"none",border:"1px solid #333",color:"#666",borderRadius:3,cursor:"pointer"}}>{"\u2715"}</button>

                const route = universeRouting[String(uni)] || {};
                const artIp = route.artnet?.ip || '';
                const artUni = route.artnet?.universe ?? (uni - 1);
                const sacnUni = route.sacn?.universe ?? uni;
                const hasCustomIp = !!route.artnet?.ip;
                const hasCustomArt = route.artnet?.universe !== undefined;
                const hasCustomSacn = route.sacn?.universe !== undefined;
                return (
                  <div key={uni} style={{display:"grid",gridTemplateColumns:"50px 1fr 90px 90px",gap:8,alignItems:"center",padding:"6px 0",borderBottom:"1px solid #0e1018"}}>

      {/* IP Keypad Popup */}
      {keypadState && (keypadState.field==='ip_host'||keypadState.field==='ip_source'||keypadState.field==='route_artnet_ip') && (() => {
        const isHost = keypadState.field === 'ip_host';
        const isRouteIp = keypadState.field === 'route_artnet_ip';
        const color = (isHost || isRouteIp) ? '#ff8844' : '#4488ff';
        const label = isRouteIp ? 'ARTNET IP \u2022 U'+keypadState.routeUniverse : (isHost ? 'HOST IP' : 'SOURCE IP');
        const isValidIpAddr = (s) => {
          if (!s) return false;
          const parts = s.split('.');
          if (parts.length !== 4) return false;
          return parts.every(p => { const n = parseInt(p); return !isNaN(n) && n >= 0 && n <= 255 && String(n) === p; });
        };
        const applyIp = (val) => {
          if (isRouteIp) {
            const uni = String(keypadState.routeUniverse);
            const ip = (val && isValidIpAddr(val)) ? val : '';
            setUniverseRouting(prev => {
              const entry = {...(prev[uni] || {})};
              if (ip) {
                entry.artnet = {...(entry.artnet || {}), ip};
              } else {
                // Invalid or empty IP → clear back to default
                if (entry.artnet) { delete entry.artnet.ip; if (Object.keys(entry.artnet).length === 0) delete entry.artnet; }
                if (!entry.artnet && !entry.sacn) { const n = {...prev}; delete n[uni]; return n; }
              }
              return {...prev, [uni]: entry};
            });
          } else {
            const ip = val || (isHost ? '127.0.0.1' : '');
            setOutputConfig(c => isHost ? {...c, artnetHost: ip} : {...c, inputSourceIP: ip});

          setKeypadState(null);

        const kpClear = () => setKeypadState(prev => ({...prev, value: '', dirty: true}));
        const kpBack = () => setKeypadState(prev => ({...prev, value: prev.value.slice(0, -1)}));

          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:10001}} onClick={()=>setKeypadState(null)}>

              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>

              <div style={{background:"#080a0e",border:"1px solid "+color+"44",borderRadius:4,padding:"6px 10px",fontSize:16,color:keypadState.dirty?color:color+"66",fontFamily:"monospace",textAlign:"right",minHeight:24,letterSpacing:1}}>{keypadState.value || (isHost?'0.0.0.0':'any')}</div>

                ))}
                <button onClick={kpDot} style={{minWidth:42,minHeight:42,padding:"10px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid "+color+"44",color:color,borderRadius:4,cursor:"pointer",fontFamily:"monospace"}}>.</button>
                <button onClick={()=>kpPress('0')} style={{minWidth:42,minHeight:42,padding:"10px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:4,cursor:"pointer",fontFamily:"monospace"}}>0</button>
                <button onClick={kpBack} style={{minWidth:42,minHeight:42,padding:"10px 0",fontSize:14,background:"#1a1e28",border:"1px solid #252930",color:"#888",borderRadius:4,cursor:"pointer"}}>&#9003;</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                <button onClick={kpClear} style={{minHeight:42,padding:"10px 0",fontSize:12,fontWeight:"bold",background:"#1c0a0a",border:"1px solid #ff333344",color:"#ff5544",borderRadius:4,cursor:"pointer",letterSpacing:1}}>CLR</button>
                <button onClick={()=>{if(keypadState.dirty){applyIp(keypadState.value);}else{setKeypadState(null);}}} style={{minHeight:42,padding:"10px 0",fontSize:13,fontWeight:"bold",background:"#0a1a0a",border:"1px solid #44ffaa44",color:"#44ffaa",borderRadius:4,cursor:"pointer",letterSpacing:2}}>ENTER</button>

      {/* Route Universe Keypad Popup (numeric only, no dot) */}
      {keypadState && (keypadState.field==='route_artnet_uni'||keypadState.field==='route_sacn_uni') && (() => {
        const isArtnet = keypadState.field === 'route_artnet_uni';
        const color = isArtnet ? '#ff8844' : '#4488ff';
        const label = isArtnet ? 'ARTNET UNI \u2022 U'+keypadState.routeUniverse : 'sACN UNI \u2022 U'+keypadState.routeUniverse;
        const maxVal = isArtnet ? 32767 : 63999;
        const defaultVal = isArtnet ? (keypadState.routeUniverse - 1) : keypadState.routeUniverse;
        const applyVal = (val, resetToDefault) => {
          const uni = String(keypadState.routeUniverse);
          if (resetToDefault || val.trim() === '') {
            // DEF button or empty input → clear custom value (back to default)
            setUniverseRouting(prev => {
              const entry = {...(prev[uni] || {})};
              if (isArtnet && entry.artnet) { delete entry.artnet.universe; if (Object.keys(entry.artnet).length === 0) delete entry.artnet; }
              if (!isArtnet && entry.sacn) { delete entry.sacn.universe; if (Object.keys(entry.sacn).length === 0) delete entry.sacn; }
              if (!entry.artnet && !entry.sacn) { const n = {...prev}; delete n[uni]; return n; }
              return {...prev, [uni]: entry};
            });
          } else {
            // Explicit value entered — always save (even if it matches default)
            const num = Math.max(0, Math.min(maxVal, parseInt(val) || 0));
            setUniverseRouting(prev => {
              const entry = {...(prev[uni] || {})};
              if (isArtnet) { entry.artnet = {...(entry.artnet || {}), universe: num}; }
              else { entry.sacn = {...(entry.sacn || {}), universe: num}; }
              return {...prev, [uni]: entry};
            });
          }
          setKeypadState(null);
        };
        const kpPress = (d) => setKeypadState(prev => prev.dirty ? ({...prev, value: prev.value + d}) : ({...prev, value: String(d), dirty: true}));
        const kpClear = () => setKeypadState(prev => ({...prev, value: '', dirty: true}));
        const kpBack = () => setKeypadState(prev => ({...prev, value: prev.value.slice(0, -1)}));
        return (
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:10001}} onClick={()=>setKeypadState(null)}>
            <div onClick={e=>e.stopPropagation()} style={{position:"fixed",top:Math.min(keypadState.rect.top, window.innerHeight-320),left:Math.min(keypadState.rect.left, window.innerWidth-222),width:210,background:"#141820",border:"1px solid "+color+"66",borderRadius:8,boxShadow:"0 8px 30px rgba(0,0,0,0.9)",padding:12,display:"flex",flexDirection:"column",gap:5}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
                <span style={{fontSize:9,color:color+"88",letterSpacing:1}}>{label}</span>
              </div>
              <div style={{background:"#080a0e",border:"1px solid "+color+"44",borderRadius:4,padding:"6px 10px",fontSize:16,color:keypadState.dirty?color:color+"66",fontFamily:"monospace",textAlign:"right",minHeight:24,letterSpacing:2}}>{keypadState.value || '0'}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>
                {[1,2,3,4,5,6,7,8,9].map(d => (

                ))}
                <button onClick={()=>applyVal(String(defaultVal), true)} style={{minWidth:42,minHeight:42,padding:"10px 0",fontSize:9,fontWeight:"bold",background:"#1a1e28",border:"1px solid "+color+"33",color:color+"88",borderRadius:4,cursor:"pointer",letterSpacing:0.5}}>DEF</button>
                <button onClick={()=>kpPress('0')} style={{minWidth:42,minHeight:42,padding:"10px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:4,cursor:"pointer",fontFamily:"monospace"}}>0</button>
                <button onClick={kpBack} style={{minWidth:42,minHeight:42,padding:"10px 0",fontSize:14,background:"#1a1e28",border:"1px solid #252930",color:"#888",borderRadius:4,cursor:"pointer"}}>&#9003;</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                <button onClick={kpClear} style={{minHeight:42,padding:"10px 0",fontSize:12,fontWeight:"bold",background:"#1c0a0a",border:"1px solid #ff333344",color:"#ff5544",borderRadius:4,cursor:"pointer",letterSpacing:1}}>CLR</button>
                <button onClick={()=>{if(keypadState.dirty){applyVal(keypadState.value);}else{setKeypadState(null);}}} style={{minHeight:42,padding:"10px 0",fontSize:13,fontWeight:"bold",background:"#0a1a0a",border:"1px solid #44ffaa44",color:"#44ffaa",borderRadius:4,cursor:"pointer",letterSpacing:2}}>ENTER</button>
              </div>
            </div>
          </div>
        );
      })()}

      {keypadState && keypadState.field==='fixture_count' && (() => {
        const color = '#44aaff';
        const label = 'FIXTURE COUNT';
        const applyCount = (val) => {
          const n = Math.max(1, Math.min(64, parseInt(val) || 1));
          setFixtures(prev => {
            if (n === prev.length) return prev;
            if (n < prev.length) return prev.slice(0, n);
            const added = [];
            const maxId = prev.reduce((m, f) => Math.max(m, f.id), 0);
            const types = Object.keys(DMX_PROFILES).filter(t => !hiddenProfiles.has(t));
            if (types.length === 0) types.push('SPOT');
            for (let i = prev.length; i < n; i++) {
              const t = types[i % types.length];
              added.push({id: maxId + 1 + (i - prev.length), name: 'Fixture ' + (maxId + 1 + (i - prev.length)), color: TYPE_COLORS[t] || '#ff5544', type: t, position: 'FRONT 1'});
            }
            return [...prev, ...added];
          });
          setKeypadState(null);
        };
        const kpPress = (d) => setKeypadState(prev => prev.dirty ? ({...prev, value: prev.value + d}) : ({...prev, value: String(d), dirty: true}));
        const kpClear = () => setKeypadState(prev => ({...prev, value: '', dirty: true}));
        const kpBack = () => setKeypadState(prev => ({...prev, value: prev.value.slice(0, -1)}));
        return (
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:10001}} onClick={()=>setKeypadState(null)}>
            <div onClick={e=>e.stopPropagation()} style={{position:"fixed",top:Math.min(keypadState.rect.top, window.innerHeight-320),left:Math.min(keypadState.rect.left, window.innerWidth-222),width:210,background:"#141820",border:"1px solid "+color+"66",borderRadius:8,boxShadow:"0 8px 30px rgba(0,0,0,0.9)",padding:12,display:"flex",flexDirection:"column",gap:5}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
                <span style={{fontSize:9,color:color+"88",letterSpacing:1}}>{label}</span>
                <span style={{fontSize:8,color:"#555"}}>1-64</span>
              </div>
              <div style={{background:"#080a0e",border:"1px solid "+color+"44",borderRadius:4,padding:"6px 10px",fontSize:16,color:keypadState.dirty?color:color+"66",fontFamily:"monospace",textAlign:"right",minHeight:24,letterSpacing:2}}>{keypadState.value || '0'}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>

              </div>
              <button onClick={()=>{if(keypadState.dirty&&keypadState.value){applyCount(keypadState.value);}else{setKeypadState(null);}}} style={{minHeight:42,padding:"10px 0",fontSize:13,fontWeight:"bold",background:"#0a1a0a",border:"1px solid #44ffaa44",color:"#44ffaa",borderRadius:4,cursor:"pointer",letterSpacing:2,width:"100%"}}>ENTER</button>
            </div>
          </div>
        );
      })()}

      {keypadState && keypadState.field==='fixture_name' && (() => {
        const color = '#44aaff';
        const caps = keypadState.caps !== false;
        const applyName = (val) => {
          const name = val.trim() || ('Fixture ' + keypadState.fxId);

          setKeypadState(null);
        };
        const kbRows = [
          ['1','2','3','4','5','6','7','8','9','0'],
          ['Q','W','E','R','T','Y','U','I','O','P'],
          ['A','S','D','F','G','H','J','K','L'],
          ['Z','X','C','V','B','N','M']

        const kbPress = (ch) => setKeypadState(prev => ({...prev, value: prev.value + (prev.caps !== false ? ch : ch.toLowerCase())}));
        const kbBack = () => setKeypadState(prev => ({...prev, value: prev.value.slice(0, -1)}));
        const kbClear = () => setKeypadState(prev => ({...prev, value: ''}));
        const kbSpace = () => setKeypadState(prev => ({...prev, value: prev.value + ' '}));
        const kbCaps = () => setKeypadState(prev => ({...prev, caps: prev.caps === false ? true : false}));
        const btnStyle = {minWidth:42,minHeight:42,padding:"10px 0",fontSize:16,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:4,cursor:"pointer",fontFamily:"monospace",flex:1};
        return (
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:10001}} onClick={()=>setKeypadState(null)}>
            <div onClick={e=>e.stopPropagation()} style={{position:"fixed",bottom:10,left:"50%",transform:"translateX(-50%)",width:660,background:"#141820",border:"1px solid "+color+"66",borderRadius:8,boxShadow:"0 -4px 30px rgba(0,0,0,0.9)",padding:"12px 12px 14px",display:"flex",flexDirection:"column",gap:5}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                <span style={{fontSize:9,color:color+"88",letterSpacing:1}}>FIXTURE NAME</span>
                <div style={{flex:1,background:"#080a0e",border:"1px solid "+color+"44",borderRadius:4,padding:"6px 10px",fontSize:16,color:color,fontFamily:"monospace",minHeight:24,letterSpacing:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{keypadState.value||<span style={{color:color+"44"}}>...</span>}</div>
              </div>
              {kbRows.map((row, ri) => (
                <div key={ri} style={{display:"flex",gap:3,justifyContent:"center"}}>
                  {ri===3 && <button onClick={kbCaps} style={{...btnStyle,minWidth:50,fontSize:9,background:caps?"#1a2a3a":"#1a1e28",border:"1px solid "+(caps?"#44aaff66":"#252930"),color:caps?"#44aaff":"#666",letterSpacing:1}}>CAPS</button>}
                  {row.map(ch => (
                    <button key={ch} onClick={()=>kbPress(ch)} style={btnStyle}>{caps ? ch : ch.toLowerCase()}</button>
                  ))}
                  {ri===3 && <button onClick={kbBack} style={{...btnStyle,minWidth:50,fontSize:15,color:"#888"}}>&#9003;</button>}
                </div>
              ))}
              <div style={{display:"flex",gap:3,justifyContent:"center"}}>
                <button onClick={kbClear} style={{...btnStyle,minWidth:52,fontSize:11,background:"#1c0a0a",border:"1px solid #ff333344",color:"#ff5544",letterSpacing:1}}>CLR</button>
                <button onClick={()=>kbPress('-')} style={btnStyle}>-</button>
                <button onClick={()=>kbPress('_')} style={btnStyle}>_</button>
                <button onClick={()=>kbPress('.')} style={btnStyle}>.</button>
                <button onClick={kbSpace} style={{...btnStyle,flex:4,fontSize:10,color:"#666",letterSpacing:2}}>SPACE</button>
                <button onClick={()=>applyName(keypadState.value)} style={{...btnStyle,flex:2,fontSize:12,background:"#0a1a0a",border:"1px solid #44ffaa66",color:"#44ffaa",letterSpacing:2}}>ENTER</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Software Update Dialog */}
      {updateDialogOpen && (
        <div onMouseDown={e=>e.stopPropagation()} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:10002,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>{if(updateStatus!=='applying'&&updateStatus!=='restarting')setUpdateDialogOpen(false);}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0e1018",border:"1px solid #22cc5544",borderRadius:8,width:520,maxHeight:"80vh",boxShadow:"0 8px 40px rgba(0,0,0,0.8)",padding:20,display:"flex",flexDirection:"column",gap:14,overflow:"auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:12,fontWeight:"bold",color:"#22cc55",letterSpacing:2}}>{"\u21BB"} SOFTWARE UPDATE</span>
              {updateStatus==='restarting' && <span style={{fontSize:9,color:"#ffaa22",letterSpacing:1,animation:"pulse 1s infinite"}}>{"\u23F3"} RESTARTING...</span>}
            </div>

            {/* GitHub source + check button */}
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:9,color:"#555",letterSpacing:1}}>SOURCE</span>
              <span style={{flex:1,fontSize:10,color:"#6e7681",fontFamily:"monospace"}}>github.com / lumina-mini</span>
              <button onClick={doUpdateCheck} disabled={updateStatus==='checking'||updateStatus==='applying'||updateStatus==='restarting'} style={{padding:"6px 14px",fontSize:10,fontWeight:"bold",letterSpacing:1,background:updateStatus==='checking'?"#0a2a1a":"#0c0e12",border:"1px solid #22cc5566",color:"#22cc55",borderRadius:4,cursor:"pointer",opacity:(updateStatus==='applying'||updateStatus==='restarting')?0.3:1}}>
                {updateStatus==='checking'?'CHECKING...':'CHECK FOR UPDATES'}
              </button>

            {/* Error message */}
            {updateError && (
              <div style={{background:"#1a0808",border:"1px solid #ff333344",borderRadius:4,padding:"8px 12px",fontSize:10,color:"#ff5544"}}>{updateError}</div>
            )}

            {/* Version info */}
            {updateInfo && (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {/* Branch / commit info */}
                <div style={{display:"flex",gap:16,padding:"6px 10px",background:"#080a0e",borderRadius:4,border:"1px solid #1e222a"}}>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    <span style={{fontSize:8,color:"#555",letterSpacing:1}}>BRANCH</span>
                    <span style={{fontSize:11,color:"#8b949e",fontFamily:"monospace"}}>{updateInfo.branch}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    <span style={{fontSize:8,color:"#555",letterSpacing:1}}>LOCAL</span>
                    <span style={{fontSize:11,color:"#8b949e",fontFamily:"monospace"}}>{updateInfo.localCommit}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    <span style={{fontSize:8,color:"#555",letterSpacing:1}}>REMOTE</span>
                    <span style={{fontSize:11,color:updateInfo.behind>0?"#22cc55":"#8b949e",fontFamily:"monospace"}}>{updateInfo.remoteCommit}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:2,marginLeft:"auto"}}>
                    <span style={{fontSize:8,color:"#555",letterSpacing:1}}>STATUS</span>
                    <span style={{fontSize:11,color:updateInfo.behind>0?"#ffaa22":"#22cc55",fontWeight:"bold"}}>
                      {updateInfo.behind > 0 ? updateInfo.behind + ' commit' + (updateInfo.behind>1?'s':'') + ' behind' : 'Up to date'}
                    </span>
                  </div>

                {/* Commit messages */}
                {updateInfo.commitMessages && updateInfo.commitMessages.length > 0 && (
                  <div style={{display:"flex",flexDirection:"column",gap:3}}>

                      <div key={i} style={{fontSize:10,color:"#c9d1d9",fontFamily:"monospace",padding:"3px 8px",background:"#0d1117",borderRadius:3,borderLeft:"2px solid #22cc5566"}}>

                      </div>
                    ))}
                  </div>
                )}

                {/* Changed files table */}

      {/* Save Show Dialog */}
      {saveDialogOpen && (

      {/* Load Show Dialog */}

                <button onClick={()=>{
