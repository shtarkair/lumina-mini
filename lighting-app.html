                <div style={{fontSize:8,color:"#ff884466",letterSpacing:2}}>OUTPUT ENGINE</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button onClick={()=>setOutputConfig(c=>({...c,enabled:!c.enabled}))} style={{flex:1,padding:"6px 0",fontSize:10,fontWeight:"bold",letterSpacing:1,background:outputConfig.enabled?"#0a2a1a":"#0c0e12",border:"2px solid "+(outputConfig.enabled?"#22cc55":"#252930"),color:outputConfig.enabled?"#22cc55":"#555",borderRadius:4,cursor:"pointer"}}>{outputConfig.enabled?"OUTPUT ON":"OUTPUT OFF"}</button>
                  <div style={{width:8,height:8,borderRadius:"50%",background:outputConnected?"#22cc55":outputConfig.enabled?"#ff4422":"#333",boxShadow:outputConnected?"0 0 8px #22cc5588":"none"}}/>
                </div>

                <div style={{fontSize:8,color:"#ff884466",letterSpacing:2,marginTop:4}}>PROTOCOLS</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                    <input type="checkbox" checked={outputConfig.artnet} onChange={e=>setOutputConfig(c=>({...c,artnet:e.target.checked}))} style={{accentColor:"#ff8844"}}/>
                    <span style={{fontSize:10,color:outputConfig.artnet?"#ff8844":"#555",fontWeight:"bold"}}>ArtNet</span>
                    <span style={{fontSize:8,color:"#333",marginLeft:"auto"}}>UDP 6454</span>
                  </label>
                  {outputConfig.artnet && (
                    <div style={{marginLeft:20,display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:8,color:"#555"}}>Host:</span>
                      <input value={outputConfig.artnetHost} onChange={e=>setOutputConfig(c=>({...c,artnetHost:e.target.value}))} style={{flex:1,background:"#0c0e12",border:"1px solid #252930",color:"#ff8844",borderRadius:3,padding:"2px 6px",fontSize:10}}/>
                    </div>
                  )}
                  <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                    <input type="checkbox" checked={outputConfig.sacn} onChange={e=>setOutputConfig(c=>({...c,sacn:e.target.checked}))} style={{accentColor:"#4488ff"}}/>
                    <span style={{fontSize:10,color:outputConfig.sacn?"#4488ff":"#555",fontWeight:"bold"}}>sACN / E1.31</span>
                    <span style={{fontSize:8,color:"#333",marginLeft:"auto"}}>Multicast</span>
                  </label>
                </div>

                <div style={{fontSize:8,color:"#ff884466",letterSpacing:2,marginTop:4}}>DMX RATE</div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <input type="range" min={10} max={50} value={outputConfig.dmxRate} onChange={e=>setOutputConfig(c=>({...c,dmxRate:+e.target.value}))} style={{flex:1,accentColor:"#ff8844"}}/>
                  <span style={{fontSize:9,color:"#ff8844",width:40,textAlign:"right"}}>{Math.round(1000/outputConfig.dmxRate)}Hz</span>
                </div>

                <div style={{fontSize:8,color:"#ff884466",letterSpacing:2,marginTop:4}}>FIXTURES & PATCH</div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>setFixtureManagerOpen(true)} style={{flex:1,padding:"6px 0",fontSize:10,fontWeight:"bold",letterSpacing:1,background:"#0c0e12",border:"2px solid #44aaff44",color:"#44aaff",borderRadius:4,cursor:"pointer"}}>{"\u2699"} FIXTURES</button>
                  <button onClick={()=>setDmxPatchModalOpen(true)} style={{flex:1,padding:"6px 0",fontSize:10,fontWeight:"bold",letterSpacing:1,background:"#0c0e12",border:"2px solid #ff884444",color:"#ff8844",borderRadius:4,cursor:"pointer"}}>OPEN PATCH</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:1,marginTop:4}}>
                  {fixtures.map(fx => {
                    const p = dmxPatch[fx.id];
                    const prof = p ? DMX_PROFILES[p.profile] : null;
                    return (
                      <div key={fx.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:7,color:"#555"}}>
                        <div style={{width:5,height:5,borderRadius:"50%",background:fx.color}}/>
                        <span style={{width:44,overflow:"hidden",whiteSpace:"nowrap"}}>{fx.name}</span>
                        <span style={{color:"#ff884488"}}>U{p?.universe||1} A{p?.address||1}</span>
                        <span style={{marginLeft:"auto",color:"#333"}}>{prof?prof.channels:0}ch</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Fixture Manager Modal */}
      {fixtureManagerOpen && (
        <div onMouseDown={e=>e.stopPropagation()} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setFixtureManagerOpen(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0e1018",border:"1px solid #44aaff44",borderRadius:8,width:560,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.8)"}}>
            <div style={{display:"flex",alignItems:"center",padding:"10px 16px",borderBottom:"1px solid #1e222a"}}>
              <span style={{fontSize:12,fontWeight:"bold",color:"#44aaff",letterSpacing:2}}>FIXTURES</span>
              <span style={{marginLeft:8,fontSize:9,color:"#555"}}>COUNT</span>
              <input type="number" min={1} max={64} value={fixtures.length} onChange={e=>{const n=Math.max(1,Math.min(64,+e.target.value));setFixtures(prev=>{if(n===prev.length)return prev;if(n<prev.length)return prev.slice(0,n);const added=[];const maxId=prev.reduce((m,f)=>Math.max(m,f.id),0);const types=Object.keys(DMX_PROFILES);for(let i=prev.length;i<n;i++){const t=types[i%types.length];added.push({id:maxId+1+(i-prev.length),name:`Fixture ${maxId+1+(i-prev.length)}`,color:TYPE_COLORS[t]||"#ff5544",type:t});}return[...prev,...added];});}} style={{width:42,marginLeft:4,background:"#080a0e",border:"1px solid #1e222a",color:"#44aaff",borderRadius:3,padding:"2px 4px",fontSize:11,textAlign:"center"}}/>
              <div style={{marginLeft:"auto",display:"flex",gap:8}}>
                <button onClick={()=>{setFixtures(defaultFixtures());setDmxPatch(generateDefaultPatch(defaultFixtures()));}} style={{padding:"4px 12px",fontSize:9,background:"#0c0e12",border:"1px solid #252930",color:"#777",borderRadius:3,cursor:"pointer",letterSpacing:1}}>RESET</button>
                <button onClick={()=>setFixtureManagerOpen(false)} style={{padding:"4px 10px",fontSize:11,background:"none",border:"1px solid #333",color:"#666",borderRadius:3,cursor:"pointer"}}>✕</button>
              </div>
            </div>
            <div style={{display:"flex",padding:"6px 16px",gap:4,borderBottom:"1px solid #1a1d22",fontSize:8,color:"#555",letterSpacing:1}}>
              <span style={{width:28,textAlign:"center"}}>#</span>
              <span style={{flex:1}}>NAME</span>
              <span style={{width:100}}>TYPE</span>
              <span style={{width:36,textAlign:"center"}}>COLOR</span>
              <span style={{width:36}}/>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"4px 16px 12px"}}>
              {fixtures.map((fx,idx) => (
                <div key={fx.id} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 0",borderTop:idx>0?"1px solid #1a1d22":"none"}}>
                  <span style={{width:28,textAlign:"center",fontSize:10,color:"#555"}}>{fx.id}</span>
                  <input type="text" value={fx.name} onChange={e=>{const v=e.target.value;setFixtures(prev=>prev.map(f=>f.id===fx.id?{...f,name:v}:f));}} style={{flex:1,background:"#080a0e",border:"1px solid #1e222a",color:"#ddd",borderRadius:2,padding:"3px 6px",fontSize:10}}/>
                  <select value={fx.type} onChange={e=>{const t=e.target.value;setFixtures(prev=>prev.map(f=>f.id===fx.id?{...f,type:t,color:TYPE_COLORS[t]||f.color}:f));}} style={{width:100,background:"#080a0e",border:"1px solid #1e222a",color:"#e8aa22",borderRadius:2,padding:"3px 4px",fontSize:10}}>
                    {Object.keys(DMX_PROFILES).map(t=><option key={t} value={t}>{t} ({DMX_PROFILES[t].channels}ch)</option>)}
                  </select>
                  <input type="color" value={fx.color} onChange={e=>{const c=e.target.value;setFixtures(prev=>prev.map(f=>f.id===fx.id?{...f,color:c}:f));}} style={{width:28,height:22,border:"1px solid #1e222a",borderRadius:2,background:"none",cursor:"pointer",padding:0}}/>
                  <button onClick={()=>{setFixtures(prev=>prev.filter(f=>f.id!==fx.id));}} style={{width:28,height:22,background:"#1c0a0a",border:"1px solid #ff333344",color:"#ff5544",borderRadius:2,cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              ))}
            </div>
            <div style={{padding:"8px 16px",borderTop:"1px solid #1e222a",display:"flex",gap:8}}>
              <button onClick={()=>{const maxId=fixtures.reduce((m,f)=>Math.max(m,f.id),0);const newFx={id:maxId+1,name:`Fixture ${maxId+1}`,color:"#ff5544",type:"SPOT"};setFixtures(prev=>[...prev,newFx]);}} style={{flex:1,padding:"6px 0",fontSize:10,background:"#0a1a0a",border:"1px solid #44ffaa44",color:"#44ffaa",borderRadius:3,cursor:"pointer",letterSpacing:1,fontWeight:"bold"}}>+ ADD FIXTURE</button>
              <button onClick={()=>{setDmxPatch(generateDefaultPatch(fixtures));setFixtureManagerOpen(false);}} style={{flex:1,padding:"6px 0",fontSize:10,background:"#1a1a2a",border:"1px solid #44aaff44",color:"#44aaff",borderRadius:3,cursor:"pointer",letterSpacing:1,fontWeight:"bold"}}>APPLY & CLOSE</button>
            </div>
          </div>
        </div>
      )}

      {/* DMX Patch Modal */}
      {dmxPatchModalOpen && (
        <div onMouseDown={e=>e.stopPropagation()} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setDmxPatchModalOpen(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0e1018",border:"1px solid #ff884444",borderRadius:8,width:700,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.8)"}}>
            <div style={{display:"flex",alignItems:"center",padding:"10px 16px",borderBottom:"1px solid #1e222a"}}>
              <span style={{fontSize:12,fontWeight:"bold",color:"#ff8844",letterSpacing:2}}>DMX PATCH</span>
              <div style={{marginLeft:"auto",display:"flex",gap:8}}>
                <button onClick={()=>setDmxPatch(generateDefaultPatch(fixtures))} style={{padding:"4px 12px",fontSize:9,background:"#0c0e12",border:"1px solid #252930",color:"#777",borderRadius:3,cursor:"pointer",letterSpacing:1}}>AUTO PATCH</button>
                <button onClick={()=>setDmxPatchModalOpen(false)} style={{padding:"4px 10px",fontSize:11,background:"none",border:"1px solid #333",color:"#666",borderRadius:3,cursor:"pointer"}}>✕</button>
              </div>
            </div>
            <div style={{display:"flex",padding:"6px 16px",gap:4,borderBottom:"1px solid #1a1d22",fontSize:8,color:"#555",letterSpacing:1}}>
              <span style={{width:20,textAlign:"center"}}>ON</span>
              <span style={{width:80}}>FIXTURE</span>
              <span style={{width:80}}>PARAMETER</span>
              <span style={{width:36,textAlign:"center"}}>UNI</span>
              <span style={{width:44,textAlign:"center"}}>CH</span>
              <span style={{width:28,textAlign:"center"}}>BITS</span>
              <span style={{width:50,textAlign:"right"}}>LIVE</span>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"4px 16px 12px"}}>
              {fixtures.map((fx,fxIdx) => {
                const p = dmxPatch[fx.id] || {universe:1,address:1,profile:fx.type,overrides:{}};
                const profile = DMX_PROFILES[p.profile] || DMX_PROFILES.SPOT;
                const params = Object.entries(profile.map);
                return params.map(([paramId, profEntry], pIdx) => {
                  const ov = p.overrides?.[paramId] || { universe: p.universe, channel: p.address + profEntry.offset, bits: profEntry.bits };
                  const bypassed = !!ov.bypass;
                  const paramDef = getParam(paramId);
                  const liveKey = `${fx.id}-${paramId}`;
                  const liveVal = liveValues[liveKey];
                  const isFirst = pIdx === 0;
                  const toggleBypass = () => { setDmxPatch(prev=>{const fp={...prev[fx.id]};const ovs={...(fp.overrides||{})};ovs[paramId]={...ov,bypass:!bypassed};return{...prev,[fx.id]:{...fp,overrides:ovs}};}); };
                  return (
                    <div key={`${fx.id}-${paramId}`} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 0",borderTop:isFirst&&fxIdx>0?"1px solid #1e222a":"none",marginTop:isFirst&&fxIdx>0?4:0,opacity:bypassed?0.3:1}}>
                      <div style={{width:20,display:"flex",justifyContent:"center"}}>
                        <div onClick={toggleBypass} style={{width:12,height:12,borderRadius:2,border:"1px solid "+(bypassed?"#333":"#22cc55"),background:bypassed?"#0c0e12":"#22cc5522",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:bypassed?"#333":"#22cc55"}}>{bypassed?"":"✓"}</div>
                      </div>
                      {isFirst ? (
                        <div style={{width:80,display:"flex",alignItems:"center",gap:4}}>
                          <div style={{width:6,height:6,borderRadius:"50%",background:fx.color,flexShrink:0}}/>
                          <span style={{fontSize:9,color:fx.color,fontWeight:"bold",overflow:"hidden",whiteSpace:"nowrap"}}>{fx.name}</span>
                        </div>
                      ) : <div style={{width:80}}/>}
                      <span style={{width:80,fontSize:9,color:bypassed?"#333":(paramDef?.color||"#888"),textDecoration:bypassed?"line-through":"none"}}>{paramDef?.label||paramId}</span>
                      <div onClick={e=>{if(bypassed)return;const r=e.currentTarget.getBoundingClientRect();setKeypadState({fxId:fx.id,paramId,field:'universe',value:String(ov.universe),rect:{top:r.bottom+2,left:r.left}});}} style={{width:36,background:"#080a0e",border:"1px solid "+(bypassed?"#111":(keypadState?.fxId===fx.id&&keypadState?.paramId===paramId&&keypadState?.field==='universe'?"#ff8844":"#1e222a")),color:bypassed?"#333":"#ff8844",borderRadius:2,padding:"2px 4px",fontSize:10,textAlign:"center",cursor:bypassed?"default":"pointer",userSelect:"none"}}>{ov.universe}</div>
                      <div onClick={e=>{if(bypassed)return;const r=e.currentTarget.getBoundingClientRect();setKeypadState({fxId:fx.id,paramId,field:'channel',value:String(ov.channel),rect:{top:r.bottom+2,left:r.left}});}} style={{width:44,background:"#080a0e",border:"1px solid "+(bypassed?"#111":(keypadState?.fxId===fx.id&&keypadState?.paramId===paramId&&keypadState?.field==='channel'?"#ff8844":"#1e222a")),color:bypassed?"#333":"#ff8844",borderRadius:2,padding:"2px 4px",fontSize:10,textAlign:"center",cursor:bypassed?"default":"pointer",userSelect:"none"}}>{ov.channel}</div>
                      <span style={{width:28,textAlign:"center",fontSize:8,color:bypassed?"#222":(ov.bits===16?"#4488ff":"#555")}}>{ov.bits}b</span>
                      <span style={{width:50,textAlign:"right",fontSize:9,color:bypassed?"#222":(liveVal!==undefined?"#22cc55":"#333"),fontFamily:"monospace"}}>{bypassed?"OFF":(liveVal!==undefined?`${Math.round(liveVal)}${paramDef?.unit||""}`:"—")}</span>
                    </div>
                  );
                });
              })}
            </div>
            {/* Numeric Keypad Popup */}
            {keypadState && (() => {
              const isUni = keypadState.field === 'universe';
              const max = isUni ? 64 : 512;
              const label = isUni ? 'UNIVERSE' : 'CHANNEL';
              const applyValue = (val) => {
                const v = Math.max(1, Math.min(max, parseInt(val) || 1));
                setDmxPatch(prev => {
                  const fp = {...prev[keypadState.fxId]};
                  const ovs = {...(fp.overrides || {})};
                  const existing = ovs[keypadState.paramId] || {};
                  ovs[keypadState.paramId] = {...existing, [isUni ? 'universe' : 'channel']: v};
                  return {...prev, [keypadState.fxId]: {...fp, overrides: ovs}};
                });
                setKeypadState(null);
              };
              const kpPress = (d) => setKeypadState(prev => prev.dirty ? ({...prev, value: prev.value + d}) : ({...prev, value: String(d), dirty: true}));
              const kpClear = () => setKeypadState(prev => ({...prev, value: '', dirty: true}));
              const kpBack = () => setKeypadState(prev => ({...prev, value: prev.value.slice(0, -1)}));
              return (
                <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:10001}} onClick={()=>setKeypadState(null)}>
                  <div onClick={e=>e.stopPropagation()} style={{position:"fixed",top:Math.min(keypadState.rect.top, window.innerHeight-220),left:Math.min(keypadState.rect.left, window.innerWidth-160),width:150,background:"#141820",border:"1px solid #ff884466",borderRadius:6,boxShadow:"0 8px 30px rgba(0,0,0,0.9)",padding:8,display:"flex",flexDirection:"column",gap:4}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
                      <span style={{fontSize:8,color:"#ff884488",letterSpacing:1}}>{label}</span>
                      <span style={{fontSize:8,color:"#555"}}>1–{max}</span>
                    </div>
                    <div style={{background:"#080a0e",border:"1px solid #ff884444",borderRadius:3,padding:"6px 8px",fontSize:16,color:keypadState.dirty?"#ff8844":"#ff884466",fontFamily:"monospace",textAlign:"right",minHeight:24,letterSpacing:2}}>{keypadState.value || '0'}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3}}>
                      {[1,2,3,4,5,6,7,8,9].map(d => (
                        <button key={d} onClick={()=>kpPress(String(d))} style={{padding:"8px 0",fontSize:14,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:3,cursor:"pointer",fontFamily:"monospace"}}>{d}</button>
                      ))}
                      <button onClick={kpClear} style={{padding:"8px 0",fontSize:10,fontWeight:"bold",background:"#1c0a0a",border:"1px solid #ff333344",color:"#ff5544",borderRadius:3,cursor:"pointer",letterSpacing:1}}>CLR</button>
                      <button onClick={()=>kpPress('0')} style={{padding:"8px 0",fontSize:14,fontWeight:"bold",background:"#1a1e28",border:"1px solid #252930",color:"#ddd",borderRadius:3,cursor:"pointer",fontFamily:"monospace"}}>0</button>
                      <button onClick={kpBack} style={{padding:"8px 0",fontSize:12,background:"#1a1e28",border:"1px solid #252930",color:"#888",borderRadius:3,cursor:"pointer"}}>&#9003;</button>
                    </div>
                    <button onClick={()=>{if(keypadState.dirty){applyValue(keypadState.value);}else{setKeypadState(null);}}} style={{padding:"8px 0",fontSize:11,fontWeight:"bold",background:"#0a1a0a",border:"1px solid #44ffaa44",color:"#44ffaa",borderRadius:3,cursor:"pointer",letterSpacing:2,marginTop:2}}>ENTER</button>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      <FixturePadBar fixtures={fixtures} cues={cues} setCues={setCues} playhead={playhead} playheadRef={playheadRef} beatEventRef={beatEventRef} audioMode={audioMode} onParamSelect={handleParamSelect}/>

      <div style={{height:22,background:"#141820",borderTop:"1px solid #252930",display:"flex",alignItems:"center",padding:"0 14px",gap:20,flexShrink:0}}>
        {[{label:"FIX",val:fixtures.length},{label:"TOOL",val:tool.toUpperCase()},{label:"CUES",val:cues.length},{label:"LOOP",val:loopEnabled?`${loopStart}-${loopEnd} beats`:"OFF"},{label:"BPM",val:bpm},{label:"AUDIO",val:audioMode==='none'?'OFF':audioMode==='file'?(audioFileName||'FILE'):'MIC'},{label:"OUTPUT",val:outputConfig.enabled?(outputConnected?"LIVE":"DISC"):"OFF"}].map(item=>(
          <span key={item.label} style={{fontSize:8,color:"#444"}}>
            <span style={{color:"#252930",marginRight:4}}>{item.label}</span>
            <span style={{color:"#666"}}>{item.val}</span>
          </span>
        ))}
        <div style={{flex:1}}/>
        <span style={{fontSize:8,color:"#1e222a"}}>LUMINA FX v0.5+artnet</span>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<LightingTimeline />);
  </script>
</body>
</html>
